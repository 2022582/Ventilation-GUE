<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- 모바일 확대 방지 및 안전 영역 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>급식실 배기장치 스마트 점검 앱</title>
  
  <!-- CDN 로드 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    
    /* 완벽한 A4 출력을 위한 Print CSS */
    @media print {
      @page { size: A4 portrait; margin: 10mm; }
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
      .no-print { display: none !important; }
      html, body, #root { height: auto !important; overflow: visible !important; }
      .page-break-inside-avoid { page-break-inside: avoid; break-inside: avoid; }
      .page-break-before { page-break-before: always; }
      ::-webkit-scrollbar { display: none; }
      .print-border { border-color: #cbd5e1 !important; }
    }

    /* 스크롤바 커스텀 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    /* 모바일 하단 네비게이션 여백 */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased overflow-hidden print:overflow-visible">
  
  <div id="root" class="h-screen w-full print:h-auto print:w-auto"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    // --- 아이콘 컴포넌트 (SVG 직접 구현) ---
    const ChefHat = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-4a2 2 0 0 0-2-2h-6a2 2 0 0 0-2 2v4"/><path d="M5 11c-.5 0-1-.5-1-1a3 3 0 0 1 6 0c0 .5-.5 1-1 1"/><path d="M19 11c.5 0 1-.5 1-1a3 3 0 0 0-6 0c0 .5.5 1 1 1"/><path d="M12 11c.5 0 1-.5 1-1a4 4 0 0 0-8 0c0 .5.5 1 1 1"/><path d="M12 11c-.5 0-1-.5-1-1a4 4 0 0 1 8 0c0 .5-.5 1-1 1"/></svg>;
    const MousePointer2 = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z"/></svg>;
    const FanIcon = ({className, x, y, width, height}) => <svg className={className||""} x={x} y={y} width={width||24} height={height||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.827 16.379a6.082 6.082 0 0 1-8.618-7.002l5.412 1.45a6.082 6.082 0 0 1 7.002-8.618l-1.45 5.412a6.082 6.082 0 0 1 8.618 7.002l-5.412-1.45a6.082 6.082 0 0 1-7.002 8.618l1.45-5.412Z"/><path d="M12 12v.01"/></svg>;
    const SquareIcon = ({className, x, y, width, height}) => <svg className={className||""} x={x} y={y} width={width||24} height={height||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>;
    const MinusIcon = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/></svg>;
    const Trash2 = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const CameraIcon = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
    const XCircle = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
    const PrinterIcon = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
    const FileCheckIcon = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></svg>;
    const FactoryIcon = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M17 18h1"/><path d="M12 18h1"/><path d="M7 18h1"/></svg>;
    const SaveIcon = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const UploadIcon = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
    // ✅ 전송/공유 아이콘 추가
    const SendIcon = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;

    // --- 상수 데이터 ---
    const KITCHEN_HOOD_TYPES = {
      'rice': { label: '밥솥', vel: 0.5 },
      'soup': { label: '국솥', vel: 0.5 },
      'prep': { label: '조리대', vel: 0.7 },
      'oven': { label: '오븐', vel: 0.5 },
      'dish': { label: '세척기', vel: 0.7 },
      'fry': { label: '튀김/부침기', vel: 0.7 },
      'other': { label: '기타', vel: 0.5 }
    };

    // --- 메인 애플리케이션 컴포넌트 ---
    function App() {
      // 모바일 탭 상태 관리 (input 모드 vs report 모드)
      const [mobileTab, setMobileTab] = useState('input');

      // 기본 상태
      const [workplaceName, setWorkplaceName] = useState("");
      const [representative, setRepresentative] = useState("");
      const [location, setLocation] = useState("");
      const [useLayout, setUseLayout] = useState(true); 
      
      // 도면 데이터 상태
      const [nodes, setNodes] = useState([]);
      const [edges, setEdges] = useState([]);
      const [guides, setGuides] = useState([]); 

      // 에디터 툴 상태
      const [tool, setTool] = useState("select"); 
      const [selectedNodeId, setSelectedNodeId] = useState(null);
      const [selectedEdgeId, setSelectedEdgeId] = useState(null);
      const [draggingNodeId, setDraggingNodeId] = useState(null);
      const [drawingEdge, setDrawingEdge] = useState(null);
      const svgRef = useRef(null);

      // 종합 평가표 상태
      const [checklist, setChecklist] = useState({
        size: { status: '양호', remark: '', improvement: '' },
        duct: { status: '양호', remark: '', improvement: '' },
        height: { status: '양호', remark: '', improvement: '' },
        velocity: { remark: '', improvement: '' },
        volume: { remark: '', improvement: '' }
      });

      const [overallReview, setOverallReview] = useState("");

      // --- 핸들러 함수들 ---
      const handleChecklistChange = (category, field, value) => {
        setChecklist(prev => ({ ...prev, [category]: { ...prev[category], [field]: value } }));
      };

      const handleSave = () => {
        const dataToSave = { workplaceName, representative, location, useLayout, nodes, edges, checklist, overallReview };
        const jsonString = JSON.stringify(dataToSave, null, 2);
        const blob = new Blob([jsonString], { type: "application/json" });
        const href = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = href;
        link.download = `${workplaceName || "급식실_스마트점검"}_데이터.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleLoad = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const loadedData = JSON.parse(e.target.result);
            if (loadedData.workplaceName !== undefined) setWorkplaceName(loadedData.workplaceName);
            if (loadedData.representative !== undefined) setRepresentative(loadedData.representative);
            if (loadedData.location !== undefined) setLocation(loadedData.location);
            if (loadedData.useLayout !== undefined) setUseLayout(loadedData.useLayout);
            if (loadedData.nodes) setNodes(loadedData.nodes);
            if (loadedData.edges) setEdges(loadedData.edges);
            if (loadedData.checklist) setChecklist(loadedData.checklist);
            if (loadedData.overallReview !== undefined) setOverallReview(loadedData.overallReview);
            
            setSelectedNodeId(null);
            setSelectedEdgeId(null);
            setGuides([]);
            alert("데이터를 성공적으로 불러왔습니다!");
          } catch (error) {
            alert("파일 형식이 올바르지 않거나 손상되었습니다.");
          }
        };
        reader.readAsText(file);
        event.target.value = null;
      };

      // 핵심 로직: 후드 평가 및 산출 (조기 선언하여 메일 요약에서도 사용)
      const calculateResult = (data) => {
        const w = parseFloat(data.width) || 0;
        const h = parseFloat(data.height) || 0;
        let area = w * h;
        const vc = parseFloat(data.controlVelocity) || 0;
        const vm = parseFloat(data.measuredVelocity) || 0;
        
        let requiredQ = area * vc * 60; 
        const currentQ = area * vm * 60;

        const isVelocityGood = vm >= vc; 
        const isVolumeGood = currentQ >= requiredQ;
        const isGood = isVelocityGood && isVolumeGood && currentQ > 0;

        const ew = parseFloat(data.equipWidth) || 0;
        const eh = parseFloat(data.equipHeight) || 0;
        const hd = parseFloat(data.hoodDepth) || 0;
        
        let isSizeGood = true;
        let sizeBadReason = [];
        if (ew > 0 && w < ew + 0.15) { isSizeGood = false; sizeBadReason.push("가로 돌출폭 부족"); }
        if (eh > 0 && h < eh + 0.15) { isSizeGood = false; sizeBadReason.push("세로 돌출폭 부족"); }
        if (hd > 0 && hd < 0.6) { isSizeGood = false; sizeBadReason.push("깊이 60cm 미달"); }

        const hb = parseFloat(data.hoodBottomHeight) || 0;
        const isHeightGood = hb > 0 && hb <= 1.2;

        const dCount = parseInt(data.ductCount) || 1;
        const reqDuctCount = Math.ceil(w / 1.8);
        const isDuctGood = w > 0 ? (dCount >= reqDuctCount) : true;

        return { 
          area: area.toFixed(2), 
          requiredQ: requiredQ.toFixed(1), currentQ: currentQ.toFixed(1), 
          isVelocityGood, isVolumeGood, isGood,
          isSizeGood, sizeBadReason: sizeBadReason.join(', '),
          isHeightGood, isDuctGood, reqDuctCount
        };
      };

      const hoodsData = useMemo(() => {
        return nodes.filter(n => n.type === 'hood').map(n => {
          return { ...n, calc: calculateResult(n.data) };
        });
      }, [nodes]);

      const evalData = useMemo(() => {
        if (hoodsData.length === 0) return { sizeStatus: '-', sizeTarget: '', ductStatus: '-', ductTarget: '', heightStatus: '-', heightTarget: '', velStatus: '-', velTarget: '', volStatus: '-', volTarget: '' };

        const badSizeHoods = hoodsData.filter(h => !h.calc.isSizeGood && (h.data.equipWidth || h.data.hoodDepth)).map(h => `${h.data.processName}(${h.calc.sizeBadReason})`).join(', ');
        const badDuctHoods = hoodsData.filter(h => !h.calc.isDuctGood && h.data.width).map(h => h.data.processName).join(', ');
        const badHeightHoods = hoodsData.filter(h => !h.calc.isHeightGood && h.data.hoodBottomHeight).map(h => h.data.processName).join(', ');
        const badVelHoods = hoodsData.filter(h => !h.calc.isVelocityGood).map(h => h.data.processName).join(', ');
        const badVolHoods = hoodsData.filter(h => !h.calc.isVolumeGood).map(h => h.data.processName).join(', ');
        
        return {
          sizeStatus: badSizeHoods ? '미흡' : '양호',
          sizeTarget: badSizeHoods ? `[미흡: ${badSizeHoods}]` : '',
          ductStatus: badDuctHoods ? '미흡' : '양호',
          ductTarget: badDuctHoods ? `[미흡: ${badDuctHoods}]` : '',
          heightStatus: badHeightHoods ? '미흡' : '양호',
          heightTarget: badHeightHoods ? `[미흡: ${badHeightHoods}]` : '',
          velStatus: badVelHoods ? '미흡' : '양호',
          velTarget: badVelHoods ? `[미흡: ${badVelHoods}]` : '',
          volStatus: badVolHoods ? '미흡' : '양호',
          volTarget: badVolHoods ? `[미흡: ${badVolHoods}]` : '',
        };
      }, [hoodsData]);

      // ✅ 모바일 메일 전송 / 공유 기능 ✅
      const handleEmailShare = () => {
        const reportText = `[국소배기장치 성능평가 점검 결과 요약]
- 사업장명: ${workplaceName || '미입력'}
- 대표자: ${representative || '미입력'}
- 소재지: ${location || '미입력'}

[종합 평가 결과]
- 후드 적정크기: ${evalData.sizeStatus} ${evalData.sizeTarget}
- 덕트 연결상태: ${evalData.ductStatus} ${evalData.ductTarget}
- 설치 높이: ${evalData.heightStatus} ${evalData.heightTarget}
- 제어풍속 만족: ${evalData.velStatus} ${evalData.velTarget}
- 필요배기량 만족: ${evalData.volStatus} ${evalData.volTarget}

[점검자 종합 의견]
${overallReview || '작성된 의견이 없습니다.'}

※ 본 데이터는 스마트 점검 앱에서 현장 작성되었습니다.`;

        // 모바일 Web Share API 지원 시 (카톡, 메시지 등 선택 가능)
        if (navigator.share) {
          navigator.share({
            title: `${workplaceName || '작업장'} 배기장치 점검결과`,
            text: reportText
          }).catch(console.error);
        } else {
          // PC 또는 미지원 환경에서는 메일 클라이언트 오픈
          const subject = encodeURIComponent(`${workplaceName || '작업장'} 배기장치 점검결과`);
          const body = encodeURIComponent(reportText);
          window.location.href = `mailto:?subject=${subject}&body=${body}`;
        }
      };

      // SVG 좌표 계산
      const getMousePos = (e) => {
        if (!useLayout || !svgRef.current) return { rawX: 0, rawY: 0 };
        const svg = svgRef.current;
        const CTM = svg.getScreenCTM();
        let clientX = e.clientX, clientY = e.clientY;
        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
        }
        const rawX = (clientX - CTM.e) / CTM.a;
        const rawY = (clientY - CTM.f) / CTM.d;
        return { rawX, rawY };
      };

      // 도면 객체 생성 로직
      const createHood = (x = 110, y = 110) => {
        const hoodNum = nodes.filter(n => n.type === 'hood').length + 1;
        const newNode = {
          id: `hood-${Date.now()}`, type: 'hood', x, y,
          data: {
            processName: `조리대-${hoodNum}`, photo: null, kHoodType: "prep", 
            controlVelocity: 0.7, measuredVelocity: "", 
            width: "", height: "", manualFanName: "", remarks: "",
            equipWidth: "", equipHeight: "", hoodDepth: "", hoodBottomHeight: "", ductCount: "1"
          }
        };
        setNodes(prev => [...prev, newNode]); setSelectedNodeId(newNode.id); setSelectedEdgeId(null);
      };

      const createFan = (x = 210, y = 110) => {
        const newNode = {
          id: `fan-${Date.now()}`, type: 'fan', x, y,
          data: { 
            fanName: `송풍기-${nodes.filter(n => n.type === 'fan').length + 1}`, 
            photo: null, 
            ratedQ: "", ratedSP: "", measuredQ: "", measuredSP: "" 
          }
        };
        setNodes(prev => [...prev, newNode]); setSelectedNodeId(newNode.id); setSelectedEdgeId(null);
      };

      // 배관 스냅핑 타겟 찾기
      const findSnapTarget = (rawX, rawY, excludeNodeId) => {
        const nearbyNodes = nodes.filter(n => n.id !== excludeNodeId && Math.abs(n.x - rawX) < 25 && Math.abs(n.y - rawY) < 25);
        if (nearbyNodes.length > 0) {
          const mainNode = nearbyNodes.find(n => n.type !== 'joint');
          const snapNode = mainNode || nearbyNodes[0];
          return { type: 'node', node: snapNode, x: snapNode.x, y: snapNode.y };
        }
        return null;
      };

      // 도면 인터랙션 이벤트
      const handlePointerDown = (e) => {
        if (!useLayout) return;
        const { rawX, rawY } = getMousePos(e);
        // 20px Grid Snapping
        const x = Math.round((rawX - 10) / 20) * 20 + 10;
        const y = Math.round((rawY - 10) / 20) * 20 + 10;
        
        if (tool === 'select') { 
          setSelectedNodeId(null); setSelectedEdgeId(null); 
        } else if (tool === 'hood') { 
          createHood(x, y); setTool('select'); 
        } else if (tool === 'fan') { 
          createFan(x, y); setTool('select'); 
        } else if (tool === 'line') {
          const snapTarget = findSnapTarget(rawX, rawY, null);
          let startNodeId = snapTarget ? snapTarget.node.id : (() => {
            const n = { id: `joint-${Date.now()}`, type: 'joint', x, y, data: {} };
            setNodes(prev => [...prev, n]); return n.id;
          })();
          setDrawingEdge({ startNodeId, x, y, cornerX: null, cornerY: null, snapTarget: null });
        }
      };

      const handlePointerMove = (e) => {
        if (!useLayout) return;
        let { rawX, rawY } = getMousePos(e);
        let snappedX = Math.round((rawX - 10) / 20) * 20 + 10;
        let snappedY = Math.round((rawY - 10) / 20) * 20 + 10;
        let activeGuides = [];

        const checkAlignment = (excludeId) => {
          let foundX = false, foundY = false;
          nodes.forEach(n => {
            if (n.id === excludeId) return;
            if (!foundX && Math.abs(rawX - n.x) < 15) { snappedX = n.x; activeGuides.push({ axis: 'x', value: n.x }); foundX = true; }
            if (!foundY && Math.abs(rawY - n.y) < 15) { snappedY = n.y; activeGuides.push({ axis: 'y', value: n.y }); foundY = true; }
          });
        };

        if (draggingNodeId) {
          checkAlignment(draggingNodeId); setGuides(activeGuides);
          setNodes(prev => prev.map(n => n.id === draggingNodeId ? { ...n, x: snappedX, y: snappedY } : n)); 
          return;
        }
        
        if (drawingEdge) {
          checkAlignment(drawingEdge.startNodeId); setGuides(activeGuides);
          const startNode = nodes.find(n => n.id === drawingEdge.startNodeId);
          if (!startNode) return;

          // 직교(Orthogonal) 라인 라우팅 계산
          const isHorizontal = Math.abs(rawX - startNode.x) > Math.abs(rawY - startNode.y);
          let currentX = isHorizontal ? snappedX : startNode.x;
          let currentY = isHorizontal ? startNode.y : snappedY;
          let cornerX = null, cornerY = null;
          let snapTarget = findSnapTarget(rawX, rawY, startNode.id);

          if (snapTarget) {
            currentX = snapTarget.x; currentY = snapTarget.y;
            if (startNode.x !== currentX && startNode.y !== currentY) {
              cornerX = isHorizontal ? currentX : startNode.x; 
              cornerY = isHorizontal ? startNode.y : currentY;
            }
          }
          setDrawingEdge({ ...drawingEdge, x: currentX, y: currentY, cornerX, cornerY, snapTarget });
          return;
        }
        setGuides([]); 
      };

      const handlePointerUp = (e) => {
        if (!useLayout) return;
        setGuides([]);
        if (draggingNodeId) { setDraggingNodeId(null); return; }
        if (!drawingEdge) return;
        
        let { rawX, rawY } = getMousePos(e);
        const startNode = nodes.find(n => n.id === drawingEdge.startNodeId);
        if (!startNode) return;

        const isHorizontal = Math.abs(rawX - startNode.x) > Math.abs(rawY - startNode.y);
        let currentX = isHorizontal ? Math.round((rawX - 10) / 20) * 20 + 10 : startNode.x;
        let currentY = isHorizontal ? startNode.y : Math.round((rawY - 10) / 20) * 20 + 10;
        let cornerX = null, cornerY = null;
        let finalSnapTarget = findSnapTarget(rawX, rawY, startNode.id);

        if (finalSnapTarget) {
          currentX = finalSnapTarget.x; currentY = finalSnapTarget.y;
          if (startNode.x !== currentX && startNode.y !== currentY) {
            cornerX = isHorizontal ? currentX : startNode.x; cornerY = isHorizontal ? startNode.y : currentY;
          }
        }

        let newNodes = [...nodes], newEdges = [...edges], lastEndId = startNode.id;
        
        // 코너가 발생한 경우 조인트 노드 추가
        if (cornerX !== null) {
          const cornerNode = { id: `joint-${Date.now()}-c`, type: 'joint', x: cornerX, y: cornerY, data: {} };
          newNodes.push(cornerNode); 
          newEdges.push({ id: `edge-${Date.now()}-c`, from: lastEndId, to: cornerNode.id });
          lastEndId = cornerNode.id;
        }

        let targetNodeId;
        if (finalSnapTarget) {
          targetNodeId = finalSnapTarget.node.id;
        } else {
          const endJoint = { id: `joint-${Date.now()}-e`, type: 'joint', x: currentX, y: currentY, data: {} };
          newNodes.push(endJoint); 
          targetNodeId = endJoint.id;
        }
        
        if (lastEndId !== targetNodeId) {
          newEdges.push({ id: `edge-${Date.now()}-e`, from: lastEndId, to: targetNodeId });
        }

        setNodes(newNodes); setEdges(newEdges); setDrawingEdge(null); setTool('select');
      };

      const handleNodePointerDown = (e, id) => {
        if (!useLayout) return;
        e.stopPropagation();
        if (tool === 'select') { 
          setSelectedEdgeId(null); setSelectedNodeId(id); setDraggingNodeId(id); 
        } else if (tool === 'line' && !drawingEdge) {
          const node = nodes.find(n => n.id === id);
          setDrawingEdge({ startNodeId: id, x: node.x, y: node.y, cornerX: null, cornerY: null, snapTarget: null });
        }
      };

      const handleEdgePointerDown = (e, id) => {
        if (!useLayout) return;
        e.stopPropagation();
        if (tool === 'select') { 
          setSelectedNodeId(null); setSelectedEdgeId(id); 
        }
      };

      const deleteSelected = () => {
        if (selectedNodeId) {
          setNodes(nodes.filter(n => n.id !== selectedNodeId));
          setEdges(edges.filter(e => e.from !== selectedNodeId && e.to !== selectedNodeId));
          setSelectedNodeId(null);
        } else if (selectedEdgeId) {
          setEdges(edges.filter(e => e.id !== selectedEdgeId)); 
          setSelectedEdgeId(null);
        }
      };

      const updateNodeData = (field, value) => {
        if (!selectedNodeId) return;
        setNodes(prevNodes => prevNodes.map(n => {
          if (n.id === selectedNodeId) {
            let newData = { ...n.data, [field]: value };
            if (field === 'kHoodType') {
              newData.controlVelocity = KITCHEN_HOOD_TYPES[value].vel;
              newData.processName = `${KITCHEN_HOOD_TYPES[value].label}-${prevNodes.filter(x => x.type === 'hood').length}`;
            }
            return { ...n, data: newData };
          }
          return n;
        }));
      };

      const handlePhotoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => updateNodeData('photo', ev.target.result);
          reader.readAsDataURL(file);
        }
      };

      const fansData = useMemo(() => {
        return nodes.filter(n => n.type === 'fan').map(fan => {
          const connectedHoods = hoodsData.filter(h => h.data.manualFanName && h.data.manualFanName.trim() === fan.data.fanName.trim());
          const sumReqQ = connectedHoods.reduce((sum, h) => sum + parseFloat(h.calc.requiredQ || 0), 0);
          const sumCurrentQ = connectedHoods.reduce((sum, h) => sum + parseFloat(h.calc.currentQ || 0), 0);
          
          const rQ = parseFloat(fan.data.ratedQ) || 0;
          const mQ = parseFloat(fan.data.measuredQ) || 0;
          const eff = rQ > 0 ? (mQ / rQ) * 100 : 0;
          
          let status = '-';
          if (rQ > 0 && mQ > 0) {
             if (eff >= 80) status = '양호';
             else if (eff >= 60) status = '미흡';
             else status = '불량';
          }
          return { ...fan, calc: { connectedHoods, sumReqQ, sumCurrentQ, eff, status } };
        });
      }, [nodes, hoodsData]);

      const selectedNode = nodes.find(n => n.id === selectedNodeId);
      const selectedNodeCalc = selectedNode?.type === 'hood' ? calculateResult(selectedNode.data) : null;

      return (
        <div className="flex flex-col lg:flex-row h-full pb-[60px] lg:pb-0 bg-slate-100 font-sans text-slate-800 overflow-hidden print:block print:h-auto print:overflow-visible print:bg-white print:pb-0">
          
          {/* ========================================== */}
          {/* 모바일 전용 하단 탭 바 (스마트폰 최적화) */}
          {/* ========================================== */}
          <div className="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex z-50 print:hidden pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button onClick={() => setMobileTab('input')} className={`flex-1 pt-3 pb-2 text-center text-xs font-bold flex flex-col items-center justify-center transition-colors ${mobileTab === 'input' ? 'text-orange-600 bg-orange-50' : 'text-slate-500 hover:bg-slate-50'}`}>
              <FileCheckIcon className="w-5 h-5 mb-1" />
              점검 입력
            </button>
            <button onClick={() => setMobileTab('report')} className={`flex-1 pt-3 pb-2 text-center text-xs font-bold flex flex-col items-center justify-center transition-colors ${mobileTab === 'report' ? 'text-orange-600 bg-orange-50' : 'text-slate-500 hover:bg-slate-50'}`}>
              <PrinterIcon className="w-5 h-5 mb-1" />
              결과 보고서
            </button>
          </div>

          {/* ========================================== */}
          {/* 좌측 패널 (입력 컨트롤) */}
          {/* ========================================== */}
          <div className={`w-full lg:w-[450px] flex-shrink-0 bg-white border-r border-slate-200 shadow-xl z-10 flex-col h-full print:hidden ${mobileTab === 'input' ? 'flex' : 'hidden lg:flex'}`}>
            <div className="p-3 sm:p-4 bg-orange-600 text-white flex justify-between items-center shadow-sm">
              <div>
                <h1 className="text-base sm:text-lg font-black flex items-center gap-1.5"><ChefHat className="w-5 h-5" /> 스마트 점검</h1>
                <p className="text-orange-200 text-[10px] sm:text-xs mt-0.5">KOSHA W-26-2022 완벽 적용</p>
              </div>
              <div className="flex gap-1.5 sm:gap-2">
                <label className="bg-orange-800 hover:bg-orange-700 p-2 rounded flex items-center justify-center gap-1 text-[11px] sm:text-xs font-bold shadow-sm transition-colors border border-orange-500 cursor-pointer">
                  <UploadIcon className="w-4 h-4" /> <span className="hidden sm:inline">불러오기</span>
                  <input type="file" accept=".json" className="hidden" onChange={handleLoad} />
                </label>
                <button onClick={handleSave} className="bg-orange-800 hover:bg-orange-700 p-2 rounded flex items-center justify-center gap-1 text-[11px] sm:text-xs font-bold shadow-sm transition-colors border border-orange-500">
                  <SaveIcon className="w-4 h-4" /> <span className="hidden sm:inline">저장</span>
                </button>
                <button onClick={handleEmailShare} className="bg-blue-600 hover:bg-blue-500 p-2 rounded flex items-center justify-center gap-1 text-[11px] sm:text-xs font-bold shadow-sm transition-colors border border-blue-400">
                  <SendIcon className="w-4 h-4" /> <span className="hidden sm:inline">공유</span>
                </button>
                <button onClick={() => window.print()} className="bg-orange-800 hover:bg-orange-700 p-2 rounded flex items-center justify-center gap-1 text-[11px] sm:text-xs font-bold shadow-sm transition-colors border border-orange-500 hidden sm:flex">
                  <PrinterIcon className="w-4 h-4" /> 출력
                </button>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-4 space-y-6">
              
              {/* 1. 사업장 및 Layout 설정 */}
              <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                <h2 className="text-sm font-black text-slate-700 mb-3">1. 사업장 현황 및 레이아웃 설정</h2>
                <div className="space-y-2 mb-3">
                  <div className="relative">
                    <FactoryIcon className="absolute left-3 top-2.5 w-4 h-4 text-slate-400" />
                    <input type="text" placeholder="사업장명 (예: 00학교 급식실)" 
                      value={workplaceName} onChange={e => setWorkplaceName(e.target.value)}
                      className="w-full pl-9 p-2 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-orange-500 outline-none font-bold text-slate-700" />
                  </div>
                  <div className="flex gap-2">
                    <input type="text" placeholder="대표자" 
                      value={representative} onChange={e => setRepresentative(e.target.value)}
                      className="w-1/3 p-2 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-orange-500 outline-none" />
                    <input type="text" placeholder="소재지 (주소)" 
                      value={location} onChange={e => setLocation(e.target.value)}
                      className="w-2/3 p-2 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-orange-500 outline-none" />
                  </div>
                </div>
                <div className="flex items-center justify-between mb-3">
                  <span className="text-xs font-bold text-slate-600">도면(Lay-out) 직접 그리기</span>
                  <label className="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" className="sr-only peer" checked={useLayout} onChange={e => {
                      setUseLayout(e.target.checked);
                      if (!e.target.checked) setTool('select');
                    }} />
                    <div className="w-9 h-5 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-orange-500"></div>
                  </label>
                </div>
                
                {useLayout ? (
                  <div className="grid grid-cols-4 gap-2">
                    <button onClick={() => setTool('select')} className={`flex flex-col items-center py-2 rounded border transition-colors ${tool === 'select' ? 'bg-orange-100 text-orange-700 border-orange-300 shadow-inner' : 'bg-white hover:bg-slate-100 border-slate-200 shadow-sm'}`}>
                      <MousePointer2 className="w-4 h-4 mb-1" /> <span className="text-[10px] font-bold">선택/수정</span>
                    </button>
                    <button onClick={() => setTool('fan')} className={`flex flex-col items-center py-2 rounded border transition-colors ${tool === 'fan' ? 'bg-orange-100 text-orange-700 border-orange-300 shadow-inner' : 'bg-white hover:bg-slate-100 border-slate-200 shadow-sm'}`}>
                      <FanIcon className="w-4 h-4 mb-1" /> <span className="text-[10px] font-bold">송풍기</span>
                    </button>
                    <button onClick={() => setTool('hood')} className={`flex flex-col items-center py-2 rounded border transition-colors ${tool === 'hood' ? 'bg-orange-100 text-orange-700 border-orange-300 shadow-inner' : 'bg-white hover:bg-slate-100 border-slate-200 shadow-sm'}`}>
                      <SquareIcon className="w-4 h-4 mb-1" /> <span className="text-[10px] font-bold">후드</span>
                    </button>
                    <button onClick={() => setTool('line')} className={`flex flex-col items-center py-2 rounded border transition-colors ${tool === 'line' ? 'bg-orange-100 text-orange-700 border-orange-300 shadow-inner' : 'bg-white hover:bg-slate-100 border-slate-200 shadow-sm'}`}>
                      <MinusIcon className="w-4 h-4 mb-1" /> <span className="text-[10px] font-bold">배관</span>
                    </button>
                  </div>
                ) : (
                  <div className="flex gap-2">
                    <button onClick={() => createHood()} className="flex-1 bg-white border border-slate-300 py-2 rounded shadow-sm text-xs font-bold hover:bg-slate-100 text-orange-600 transition-colors">+ 후드 추가</button>
                    <button onClick={() => createFan()} className="flex-1 bg-white border border-slate-300 py-2 rounded shadow-sm text-xs font-bold hover:bg-slate-100 text-blue-600 transition-colors">+ 송풍기 추가</button>
                  </div>
                )}
                
                {!useLayout && (
                  <div className="mt-3 flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                    {nodes.map(n => (
                      <button key={n.id} onClick={() => setSelectedNodeId(n.id)} className={`flex-shrink-0 px-3 py-1.5 rounded-full text-[10px] font-bold border transition-all ${selectedNodeId === n.id ? 'bg-slate-800 text-white border-slate-800 shadow-md transform scale-105' : 'bg-white text-slate-600 border-slate-300 shadow-sm'}`}>
                        {n.type === 'fan' ? <FanIcon className="w-3 h-3 inline mr-1" /> : <SquareIcon className="w-3 h-3 inline mr-1 text-orange-500" />}
                        {n.type === 'fan' ? n.data.fanName : n.data.processName}
                      </button>
                    ))}
                  </div>
                )}
              </div>

              {/* 2. 제원 입력 (후드 / 송풍기) */}
              <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm min-h-[350px]">
                <div className="flex justify-between items-center mb-3 border-b border-slate-200 pb-2">
                  <h2 className="text-sm font-black text-slate-700">2. 설비 제원 및 측정결과 입력</h2>
                  {(selectedNodeId || selectedEdgeId) && (
                    <button onClick={deleteSelected} className="text-red-500 hover:text-red-700 flex items-center gap-1 text-[10px] font-bold bg-red-50 px-2 py-1 rounded border border-red-200 transition-colors">
                      <Trash2 className="w-3 h-3" /> 객체 삭제
                    </button>
                  )}
                </div>

                {!selectedNode ? (
                  <div className="py-16 text-center text-slate-400 text-xs font-bold bg-white rounded-lg border border-dashed border-slate-300">
                    <MousePointer2 className="w-8 h-8 mx-auto mb-2 text-slate-300" />
                    도면이나 상단 목록에서<br/>입력할 송풍기나 후드를 선택하세요.
                  </div>
                ) : selectedNode.type === 'fan' ? (
                  <div className="space-y-4 animate-in fade-in zoom-in-95 duration-200">
                    <div>
                      <label className="block text-[10px] font-bold mb-1 text-slate-600">송풍기 명칭 (자유입력)</label>
                      <input type="text" value={selectedNode.data.fanName || ""} onChange={e => updateNodeData('fanName', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm font-bold focus:ring-2 focus:ring-orange-500 outline-none" />
                    </div>
                    
                    <div>
                      <label className="block text-[10px] font-bold mb-1 text-slate-600">송풍기 설치 사진</label>
                      <label className="flex justify-center items-center gap-2 w-full p-2 border border-slate-300 rounded text-xs font-bold bg-white hover:bg-slate-50 cursor-pointer shadow-sm transition-colors">
                        <CameraIcon className="w-4 h-4 text-slate-500" /> {selectedNode.data.photo ? "사진 변경" : "촬영 또는 첨부"}
                        <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhotoUpload} />
                      </label>
                      {selectedNode.data.photo && (
                        <div className="mt-2 relative w-24 h-16 rounded border border-slate-200 overflow-hidden shadow-sm">
                          <img src={selectedNode.data.photo} className="w-full h-full object-cover" />
                          <button onClick={() => updateNodeData('photo', null)} className="absolute top-0.5 right-0.5 bg-red-500/90 text-white rounded-full p-0.5 hover:bg-red-600"><XCircle className="w-3 h-3" /></button>
                        </div>
                      )}
                    </div>
                    
                    <div className="grid grid-cols-2 gap-3 bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                      <div className="col-span-2 text-xs font-bold text-slate-800 mb-1 border-b pb-1">명판 사양 (정격)</div>
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-slate-500">송풍량 (CMM)</label>
                        <input type="number" step="0.1" value={selectedNode.data.ratedQ || ""} onChange={e => updateNodeData('ratedQ', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none focus:ring-1 focus:ring-blue-500" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-slate-500">정압 (mmAq)</label>
                        <input type="number" step="0.1" value={selectedNode.data.ratedSP || ""} onChange={e => updateNodeData('ratedSP', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none focus:ring-1 focus:ring-blue-500" />
                      </div>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-3 bg-blue-50 p-3 rounded-lg border border-blue-200 shadow-sm">
                      <div className="col-span-2 text-xs font-black text-blue-800 mb-1 border-b border-blue-200 pb-1">현장 측정 결과</div>
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-blue-700">송풍량 (CMM)</label>
                        <input type="number" step="0.1" value={selectedNode.data.measuredQ || ""} onChange={e => updateNodeData('measuredQ', e.target.value)} className="w-full p-2 border border-blue-300 rounded text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 bg-white" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-blue-700">정압 (mmAq)</label>
                        <input type="number" step="0.1" value={selectedNode.data.measuredSP || ""} onChange={e => updateNodeData('measuredSP', e.target.value)} className="w-full p-2 border border-blue-300 rounded text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 bg-white" />
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-4 animate-in fade-in zoom-in-95 duration-200">
                    
                    <div className="bg-slate-800 p-3 rounded-lg text-white shadow-md">
                      <label className="block text-[10px] font-bold mb-1 text-slate-300 flex items-center gap-1"><FileCheckIcon className="w-3 h-3"/> 연결할 송풍기 선택 (표 병합 및 연동)</label>
                      <select value={selectedNode.data.manualFanName || ""} onChange={e => updateNodeData('manualFanName', e.target.value)} className="w-full p-1.5 border-b border-slate-500 bg-transparent text-sm font-bold outline-none focus:border-white transition-colors cursor-pointer">
                        <option value="" className="text-slate-800">-- 송풍기 미지정 (단독) --</option>
                        {nodes.filter(n => n.type === 'fan').map(f => <option key={f.id} value={f.data.fanName} className="text-slate-800">{f.data.fanName}</option>)}
                      </select>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-slate-600">급식실 후드 종류</label>
                        <select value={selectedNode.data.kHoodType} onChange={e => updateNodeData('kHoodType', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm font-bold outline-none bg-white focus:ring-2 focus:ring-orange-500 shadow-sm cursor-pointer">
                          {Object.keys(KITCHEN_HOOD_TYPES).map(k => <option key={k} value={k}>{KITCHEN_HOOD_TYPES[k].label}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-slate-600">상세 명칭 (공정명)</label>
                        <input type="text" value={selectedNode.data.processName} onChange={e => updateNodeData('processName', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm font-bold outline-none focus:ring-2 focus:ring-orange-500 shadow-sm" />
                      </div>
                    </div>

                    <div>
                      <label className="block text-[10px] font-bold mb-1 text-slate-600">후드 설치 사진</label>
                      <label className="flex justify-center items-center gap-2 w-full p-2 border border-slate-300 rounded text-xs font-bold bg-white hover:bg-slate-50 cursor-pointer shadow-sm transition-colors">
                        <CameraIcon className="w-4 h-4 text-slate-500" /> {selectedNode.data.photo ? "사진 변경" : "촬영 또는 첨부"}
                        <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhotoUpload} />
                      </label>
                      {selectedNode.data.photo && (
                        <div className="mt-2 relative w-24 h-16 rounded border border-slate-200 overflow-hidden shadow-sm">
                          <img src={selectedNode.data.photo} className="w-full h-full object-cover" />
                          <button onClick={() => updateNodeData('photo', null)} className="absolute top-0.5 right-0.5 bg-red-500/90 text-white rounded-full p-0.5 hover:bg-red-600"><XCircle className="w-3 h-3" /></button>
                        </div>
                      )}
                    </div>

                    <div className="bg-white p-3 rounded-lg border border-slate-200 shadow-sm space-y-3">
                      <div className="text-xs font-bold text-slate-800 border-b pb-1">후드 상세 규격 (m)</div>
                      <div className="grid grid-cols-2 gap-3">
                        <div className="flex items-center gap-1">
                          <input type="number" step="0.1" placeholder="가로폭(W)" value={selectedNode.data.width} onChange={e => updateNodeData('width', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none focus:ring-1 focus:ring-orange-500" /> <span className="text-[10px] text-slate-400">m</span>
                        </div>
                        <div className="flex items-center gap-1">
                          <input type="number" step="0.1" placeholder="세로폭(H)" value={selectedNode.data.height} onChange={e => updateNodeData('height', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none focus:ring-1 focus:ring-orange-500" /> <span className="text-[10px] text-slate-400">m</span>

                        <div className="flex items-center gap-1">

                        <div className="flex items-center gap-1">
                          <input type="number" step="0.1" placeholder="조리대 세로폭" value={selectedNode.data.equipHeight} onChange={e => updateNodeData('equipHeight', e.target.value)} className="w-full p-1.5 border border-slate-200 rounded text-xs outline-none bg-slate-50 focus:bg-white" /> <span className="text-[9px] text-slate-400">m</span>
                        </div>
                      </div>
                      <div className="pt-2">

                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3 bg-orange-50 p-3 rounded-lg border border-orange-200 shadow-sm">

                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-orange-700">기준 면속도 (법정)</label>
                        <input type="number" step="0.1" value={selectedNode.data.controlVelocity} onChange={e => updateNodeData('controlVelocity', e.target.value)} className="w-full p-2 border border-orange-300 rounded text-sm font-bold outline-none focus:ring-2 focus:ring-orange-500 bg-white" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-orange-700">후드 면 측정 풍속</label>
                        <input type="number" step="0.1" value={selectedNode.data.measuredVelocity} onChange={e => {
                          updateNodeData('measuredVelocity', e.target.value);
                        }} className="w-full p-2 border-2 border-orange-400 rounded text-sm font-black outline-none focus:border-orange-600 bg-white text-orange-900" />
                      </div>
                    </div>

                    <div className="mt-2">
                      <label className="block text-[10px] font-bold mb-1 text-slate-700">특이사항 (수동 비고란)</label>
                      <input type="text" placeholder="결과표 비고란에 출력됩니다" value={selectedNode.data.remarks || ""} onChange={e => updateNodeData('remarks', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none focus:ring-1 focus:ring-orange-500 shadow-sm" />
                    </div>

                    {selectedNodeCalc && (
                      <div className={`p-2.5 rounded-lg border font-bold text-xs flex justify-between shadow-sm transition-colors ${selectedNodeCalc.isGood ? 'bg-emerald-50 text-emerald-700 border-emerald-300' : 'bg-red-50 text-red-700 border-red-300'}`}>
                        <span>필요 배기량: {selectedNodeCalc.requiredQ} CMM</span>
                        <span>현재 배기량: {selectedNodeCalc.currentQ} CMM</span>
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* 3. 시설 종합 점검표 수동/자동 혼합 입력 */}
              <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                <h2 className="text-sm font-black text-slate-700 mb-3 flex items-center gap-1"><FileCheckIcon className="w-4 h-4"/> 1-4 종합 평가표 (자동 판정 연동)</h2>
                <div className="space-y-4">
                  <div className="border border-slate-200 bg-white rounded-lg p-3 shadow-sm hover:border-slate-300 transition-colors">
                    <div className="flex justify-between items-center mb-2 border-b border-slate-100 pb-2">
                      <span className="text-xs font-bold text-slate-700">후드 적정크기 <span className="font-normal text-[8px] text-blue-500 bg-blue-50 px-1 rounded">(자동)</span></span>
                      <span className={`text-xs font-black px-2 py-0.5 rounded ${evalData.sizeStatus === '양호' ? 'bg-blue-50 text-blue-600' : 'bg-red-50 text-red-600'}`}>{evalData.sizeStatus}</span>
                    </div>
                    {evalData.sizeStatus === '미흡' && <div className="text-[10px] font-bold text-red-500 mb-2 leading-tight bg-red-50 p-1.5 rounded">{evalData.sizeTarget}</div>}
                    <input type="text" placeholder="비고 (수동 추가)" value={checklist.size.remark} onChange={e => handleChecklistChange('size', 'remark', e.target.value)} className="w-full p-2 border border-slate-200 rounded text-[10px] mb-1.5 outline-none bg-slate-50 focus:bg-white focus:ring-1 focus:ring-orange-500 transition-all" />
                    <input type="text" placeholder="개선방향 (수동 입력)" value={checklist.size.improvement} onChange={e => handleChecklistChange('size', 'improvement', e.target.value)} className="w-full p-2 border border-slate-200 rounded text-[10px] outline-none bg-slate-50 focus:bg-white focus:ring-1 focus:ring-orange-500 transition-all" />
                  </div>
                  
                  <div className="border border-slate-200 bg-white rounded-lg p-3 shadow-sm hover:border-slate-300 transition-colors">
                    <div className="flex justify-between items-center mb-2 border-b border-slate-100 pb-2">
                      <span className="text-xs font-bold text-slate-700">덕트 연결/파손여부 <span className="font-normal text-[8px] text-blue-500 bg-blue-50 px-1 rounded">(간격 자동)</span></span>
                      <span className={`text-xs font-black px-2 py-0.5 rounded ${evalData.ductStatus === '양호' ? 'bg-blue-50 text-blue-600' : 'bg-red-50 text-red-600'}`}>{evalData.ductStatus}</span>
                    </div>
                    {evalData.ductStatus === '미흡' && <div className="text-[10px] font-bold text-red-500 mb-2 leading-tight bg-red-50 p-1.5 rounded">{evalData.ductTarget}</div>}
                    <input type="text" placeholder="비고 (파손 여부 등 수동 기입)" value={checklist.duct.remark} onChange={e => handleChecklistChange('duct', 'remark', e.target.value)} className="w-full p-2 border border-slate-200 rounded text-[10px] mb-1.5 outline-none bg-slate-50 focus:bg-white focus:ring-1 focus:ring-orange-500 transition-all" />
                    <input type="text" placeholder="개선방향" value={checklist.duct.improvement} onChange={e => handleChecklistChange('duct', 'improvement', e.target.value)} className="w-full p-2 border border-slate-200 rounded text-[10px] outline-none bg-slate-50 focus:bg-white focus:ring-1 focus:ring-orange-500 transition-all" />
                  </div>

                  <div className="border border-slate-200 bg-white rounded-lg p-3 shadow-sm hover:border-slate-300 transition-colors">
                    <div className="flex justify-between items-center mb-2 border-b border-slate-100 pb-2">
                      <span className="text-xs font-bold text-slate-700">후드 설치 높이 (1.2m 이내) <span className="font-normal text-[8px] text-blue-500 bg-blue-50 px-1 rounded">(자동)</span></span>
                      <span className={`text-xs font-black px-2 py-0.5 rounded ${evalData.heightStatus === '양호' ? 'bg-blue-50 text-blue-600' : 'bg-red-50 text-red-600'}`}>{evalData.heightStatus}</span>
                    </div>
                    {evalData.heightStatus === '미흡' && <div className="text-[10px] font-bold text-red-500 mb-2 leading-tight bg-red-50 p-1.5 rounded">{evalData.heightTarget}</div>}
                    <input type="text" placeholder="비고 추가" value={checklist.height.remark} onChange={e => handleChecklistChange('height', 'remark', e.target.value)} className="w-full p-2 border border-slate-200 rounded text-[10px] mb-1.5 outline-none bg-slate-50 focus:bg-white focus:ring-1 focus:ring-orange-500 transition-all" />
                    <input type="text" placeholder="개선방향" value={checklist.height.improvement} onChange={e => handleChecklistChange('height', 'improvement', e.target.value)} className="w-full p-2 border border-slate-200 rounded text-[10px] outline-none bg-slate-50 focus:bg-white focus:ring-1 focus:ring-orange-500 transition-all" />
                  </div>

                  <div className="border border-slate-200 bg-white rounded-lg p-3 shadow-sm hover:border-slate-300 transition-colors">
                    <div className="flex justify-between items-center mb-2 border-b border-slate-100 pb-2">
                      <span className="text-xs font-bold text-slate-700">제어풍속 기준 만족 <span className="font-normal text-[8px] text-blue-500 bg-blue-50 px-1 rounded">(자동)</span></span>
                      <span className={`text-xs font-black px-2 py-0.5 rounded ${evalData.velStatus === '양호' ? 'bg-blue-50 text-blue-600' : 'bg-red-50 text-red-600'}`}>{evalData.velStatus}</span>
                    </div>
                    {evalData.velStatus === '미흡' && <div className="text-[10px] font-bold text-red-500 mb-2 leading-tight bg-red-50 p-1.5 rounded">{evalData.velTarget}</div>}
                    <input type="text" placeholder="비고 추가" value={checklist.velocity.remark} onChange={e => handleChecklistChange('velocity', 'remark', e.target.value)} className="w-full p-2 border border-slate-200 rounded text-[10px] mb-1.5 outline-none bg-slate-50 focus:bg-white focus:ring-1 focus:ring-orange-500 transition-all" />
                    <input type="text" placeholder="개선방향" value={checklist.velocity.improvement} onChange={e => handleChecklistChange('velocity', 'improvement', e.target.value)} className="w-full p-2 border border-slate-200 rounded text-[10px] outline-none bg-slate-50 focus:bg-white focus:ring-1 focus:ring-orange-500 transition-all" />
                  </div>

                  <div className="border border-slate-200 bg-white rounded-lg p-3 shadow-sm hover:border-slate-300 transition-colors">
                    <div className="flex justify-between items-center mb-2 border-b border-slate-100 pb-2">
                      <span className="text-xs font-bold text-slate-700">필요 배기량 충족 여부 <span className="font-normal text-[8px] text-blue-500 bg-blue-50 px-1 rounded">(자동)</span></span>
                      <span className={`text-xs font-black px-2 py-0.5 rounded ${evalData.volStatus === '양호' ? 'bg-blue-50 text-blue-600' : 'bg-red-50 text-red-600'}`}>{evalData.volStatus}</span>
                    </div>
                    {evalData.volStatus === '미흡' && <div className="text-[10px] font-bold text-red-500 mb-2 leading-tight bg-red-50 p-1.5 rounded">{evalData.volTarget}</div>}
                    <input type="text" placeholder="비고 추가" value={checklist.volume.remark} onChange={e => handleChecklistChange('volume', 'remark', e.target.value)} className="w-full p-2 border border-slate-200 rounded text-[10px] mb-1.5 outline-none bg-slate-50 focus:bg-white focus:ring-1 focus:ring-orange-500 transition-all" />
                    <input type="text" placeholder="개선방향" value={checklist.volume.improvement} onChange={e => handleChecklistChange('volume', 'improvement', e.target.value)} className="w-full p-2 border border-slate-200 rounded text-[10px] outline-none bg-slate-50 focus:bg-white focus:ring-1 focus:ring-orange-500 transition-all" />
                  </div>
                </div>
              </div>

              {/* 1-5. 점검자 종합 의견 (총평) */}
              <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm">
                <h2 className="text-sm font-black text-slate-700 mb-3 flex items-center gap-1"><FileCheckIcon className="w-4 h-4"/> 1-5. 점검자 종합 의견 (총평)</h2>
                <textarea
                  value={overallReview}
                  onChange={e => setOverallReview(e.target.value)}
                  placeholder="점검 결과에 대한 종합적인 의견이나 특이사항을 자유롭게 작성해주세요."
                  className="w-full p-3 border border-slate-300 rounded-lg text-xs outline-none focus:ring-2 focus:ring-orange-500 bg-white h-24 resize-y leading-relaxed"
                ></textarea>
              </div>

              {/* 하단 푸터 (좌측) */}
              <div className="p-3 bg-slate-50 border border-slate-200 rounded-xl text-center text-[10px] text-slate-400 font-bold space-y-1 mt-auto shadow-sm">
                <div>ⓒ Copyright 2024. 2022582@kiha.or.kr All rights reserved.</div>
                <div className="text-orange-600">점검 미흡 및 오류 시 010-2815-6044 이규연 문의</div>
              </div>

            </div>
          </div>

          {/* ============================================================== */}
          {/* 우측 보고서 (A4 출력 영역) */}
          {/* 모바일에서는 가로 스크롤 허용 및 고정 액션 바 추가 */}
          {/* ============================================================== */}
          <div className={`flex-1 bg-slate-200 flex-col relative print:bg-white print:block ${mobileTab === 'report' ? 'flex' : 'hidden lg:flex'}`}>
            
            {/* 모바일 전용 결과 보고서 상단 액션 바 */}
            <div className="lg:hidden flex-shrink-0 sticky top-0 left-0 right-0 z-10 p-3 bg-white border-b border-slate-300 flex justify-between items-center shadow-sm print:hidden">
              <span className="font-bold text-sm text-slate-800 flex items-center gap-1.5">
                <PrinterIcon className="w-4 h-4 text-orange-600"/> 보고서 미리보기
              </span>
              <div className="flex gap-2">
                <button onClick={handleEmailShare} className="bg-blue-600 hover:bg-blue-500 p-2 px-3 rounded flex items-center justify-center gap-1 text-xs font-bold text-white shadow-sm transition-colors">
                  <SendIcon className="w-3.5 h-3.5" /> 공유
                </button>
                <button onClick={() => window.print()} className="bg-orange-800 hover:bg-orange-700 p-2 px-3 rounded flex items-center justify-center gap-1 text-xs font-bold text-white shadow-sm transition-colors">
                  <PrinterIcon className="w-3.5 h-3.5" /> 출력
                </button>
              </div>
            </div>

            {/* 스크롤 가능한 보고서 본문 영역 */}
            <div className="flex-1 overflow-auto p-0 sm:p-4 lg:p-8 print:p-0 print:overflow-visible">
              <div className="w-[800px] lg:w-full max-w-[210mm] min-h-[297mm] mx-auto bg-white shadow-2xl p-[10mm] sm:p-[15mm] print:w-auto print:max-w-none print:min-h-0 print:shadow-none print:p-0 print:m-0 flex flex-col transform origin-top-left">
                
                <div className="border-b-4 border-slate-800 pb-4 mb-6 text-center relative page-break-inside-avoid">
                  <h1 className="text-2xl font-black text-slate-900 tracking-tight">국소배기장치 성능평가</h1>
                  <div className="mt-2 text-[11px] font-bold text-slate-500">가이드라인 및 KOSHA W-26-2022 기준 적용 (본 결과는 법적 효력이 없으며 참고용입니다)</div>
                </div>

                {/* 사업장 현황 */}
              {/* 1-1 Lay-out */}
              {useLayout && (
                <div className="mb-6 print:mb-6 page-break-inside-avoid">
                  <h2 className="text-sm font-black border-l-4 border-orange-500 pl-2 mb-2 text-slate-800">1-1. 공정 Lay-out</h2>
                  {/* SVG 터치 동작 중 스크롤 방지를 위한 touch-none 클래스 적용 */}
                  <div className="w-full h-[300px] border-2 border-slate-300 print-border relative overflow-hidden rounded-md print:rounded-none">
                    <svg ref={svgRef} className={`w-full h-full bg-[#f8fafc] print:bg-white touch-none ${tool !== 'select' ? 'cursor-crosshair' : 'cursor-default'}`}
                         onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp}>
                      <defs>
                        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                          <circle cx="10" cy="10" r="1" fill="#cbd5e1" className="print:hidden"/>
                        </pattern>
                      </defs>
                      <rect width="100%" height="100%" fill="url(#grid)" className="print:hidden" />
                      
                      {guides.map((g, i) => (
                        g.axis === 'x' 
                          ? <line key={`gx-${i}`} x1={g.value} y1="0" x2={g.value} y2="2000" stroke="#f97316" strokeWidth="1" strokeDasharray="4,4" className="pointer-events-none print:hidden" />
                          : <line key={`gy-${i}`} x1="0" y1={g.value} x2="2000" y2={g.value} stroke="#f97316" strokeWidth="1" strokeDasharray="4,4" className="pointer-events-none print:hidden" />
                      ))}

                      {edges.map(e => {
                        const fromNode = nodes.find(n => n.id === e.from);
                        const toNode = nodes.find(n => n.id === e.to);
                        if(!fromNode || !toNode) return null;
                        const isSelected = selectedEdgeId === e.id;
                        return (
                          <g key={e.id}>
                            <line x1={fromNode.x} y1={fromNode.y} x2={toNode.x} y2={toNode.y} stroke="transparent" strokeWidth="20" className={tool === 'select' ? "cursor-pointer print:hidden" : "pointer-events-none print:hidden"} onPointerDown={(ev) => handleEdgePointerDown(ev, e.id)} />
                            <line x1={fromNode.x} y1={fromNode.y} x2={toNode.x} y2={toNode.y} stroke={isSelected ? "#f97316" : "#475569"} strokeWidth={isSelected ? "4" : "3"} strokeLinecap="round" className="pointer-events-none" />
                          </g>
                        );
                      })}

                      {drawingEdge && (
                        <g className="pointer-events-none print:hidden">
                          {drawingEdge.cornerX !== null ? (
                            <>
                              <line x1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.x} y1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.y} x2={drawingEdge.cornerX} y2={drawingEdge.cornerY} stroke="#f97316" strokeWidth="3" strokeDasharray="5,5" />
                              <line x1={drawingEdge.cornerX} y1={drawingEdge.cornerY} x2={drawingEdge.x} y2={drawingEdge.y} stroke="#f97316" strokeWidth="3" strokeDasharray="5,5" />
                            </>
                          ) : <line x1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.x} y1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.y} x2={drawingEdge.x} y2={drawingEdge.y} stroke="#f97316" strokeWidth="3" strokeDasharray="5,5" />}
                          {drawingEdge.snapTarget && <circle cx={drawingEdge.x} cy={drawingEdge.y} r="6" fill="#f97316" />}
                        </g>
                      )}

                      {nodes.map(n => {
                        const isSelected = n.id === selectedNodeId;
                        if (n.type === 'joint') return <circle key={n.id} cx={n.x} cy={n.y} r="6" fill={isSelected ? "#f97316" : "#94a3b8"} onPointerDown={(e) => handleNodePointerDown(e, n.id)} className={tool === 'select' ? "cursor-move hover:fill-orange-500 print:hidden" : "cursor-pointer print:hidden"} />;
                        
                        // 제어풍속 양호 여부 판단
                        const isHood = n.type === 'hood';
                        const hoodCalc = isHood ? hoodsData.find(h => h.id === n.id)?.calc : null;
                        const isHoodGood = isHood && hoodCalc?.isVelocityGood && n.data.measuredVelocity !== "";

                        let rectFill = '#ffffff';
                        let rectStroke = '#475569';
                        let iconClass = 'text-slate-700';

                        if (n.type === 'fan') {
                          rectFill = isSelected ? '#e0e7ff' : '#f1f5f9';
                          rectStroke = isSelected ? '#3b82f6' : '#475569';
                          iconClass = isSelected ? "text-blue-600 print:text-slate-800" : "text-slate-700";
                        } else {
                          rectFill = isSelected ? (isHoodGood ? '#ecfdf5' : '#fff7ed') : '#ffffff';
                          rectStroke = isSelected ? '#3b82f6' : (isHoodGood ? '#10b981' : '#f97316');
                          iconClass = isSelected ? "text-blue-600 print:text-slate-800" : (isHoodGood ? "text-emerald-600 print:text-slate-800" : "text-orange-600 print:text-slate-800");
                        }

                        return (
                          <g key={n.id} transform={`translate(${n.x - 12}, ${n.y - 12})`} onPointerDown={(e) => handleNodePointerDown(e, n.id)} className={tool === 'select' ? "cursor-pointer" : "cursor-default"}>
                            <rect width="24" height="24" rx="4" fill={rectFill} stroke={rectStroke} strokeWidth={isSelected ? "2.5" : "1.5"} className="print:fill-white" />
                            {n.type === 'fan' ? (
                              <>
                                <FanIcon x="4" y="4" width="16" height="16" className={iconClass} />
                                <text x="12" y="-6" textAnchor="middle" className={`text-[9px] font-bold bg-white px-1 ${isSelected ? 'fill-blue-600 print:fill-slate-800' : 'fill-slate-800'}`}>{n.data.fanName}</text>
                              </>
                            ) : (
                              <>
                                <SquareIcon x="4" y="4" width="16" height="16" className={iconClass} />
                                <text x="12" y="34" textAnchor="middle" className={`text-[9px] font-bold bg-white px-1 ${isSelected ? 'fill-blue-600 print:fill-slate-800' : 'fill-slate-800'}`}>{n.data.processName}</text>
                              </>
                            )}
                          </g>
                        );
                      })}
                    </svg>
                  </div>
                </div>
              )}

              {/* 1-2. 후드 조사 결과 */}
              <div className="mb-6">
                <div className="flex justify-between items-end border-l-4 border-orange-500 pl-2 mb-2 page-break-inside-avoid">
                  <h2 className="text-sm font-black text-slate-800">1-2. 후드 조사 결과 & 필요 송풍량 산정</h2>
