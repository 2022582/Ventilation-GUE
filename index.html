<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>급식실 조리실 배기장치 스마트 점검 앱</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @media print {
      @page { size: A4 portrait; margin: 15mm; }
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
      .no-print { display: none !important; }
      html, body, #root { height: auto !important; overflow: visible !important; }
      .page-break-inside-avoid { page-break-inside: avoid; break-inside: avoid; }
      .page-break-before { page-break-before: always; }
      ::-webkit-scrollbar { display: none; }
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    const ChefHat = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-4a2 2 0 0 0-2-2h-6a2 2 0 0 0-2 2v4"/><path d="M5 11c-.5 0-1-.5-1-1a3 3 0 0 1 6 0c0 .5-.5 1-1 1"/><path d="M19 11c.5 0 1-.5 1-1a3 3 0 0 0-6 0c0 .5.5 1 1 1"/><path d="M12 11c.5 0 1-.5 1-1a4 4 0 0 0-8 0c0 .5.5 1 1 1"/><path d="M12 11c-.5 0-1-.5-1-1a4 4 0 0 1 8 0c0 .5-.5 1-1 1"/></svg>;
    const MousePointer2 = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z"/></svg>;
    const Fan = ({className, x, y, width, height}) => <svg className={className||""} x={x} y={y} width={width||24} height={height||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.827 16.379a6.082 6.082 0 0 1-8.618-7.002l5.412 1.45a6.082 6.082 0 0 1 7.002-8.618l-1.45 5.412a6.082 6.082 0 0 1 8.618 7.002l-5.412-1.45a6.082 6.082 0 0 1-7.002 8.618l1.45-5.412Z"/><path d="M12 12v.01"/></svg>;
    const Square = ({className, x, y, width, height}) => <svg className={className||""} x={x} y={y} width={width||24} height={height||24} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>;
    const Minus = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/></svg>;
    const Trash2 = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const Camera = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
    const CheckCircle2 = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
    const XCircle = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
    const Printer = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
    const FileCheck = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></svg>;
    const Factory = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M17 18h1"/><path d="M12 18h1"/><path d="M7 18h1"/></svg>;
    // ✅ 데이터 저장/불러오기 아이콘 추가
    const Save = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const Upload = ({className}) => <svg className={className||""} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;

    const KITCHEN_HOOD_TYPES = {
      'rice': { label: '밥솥', vel: 0.5 },
      'soup': { label: '국솥', vel: 0.5 },
      'prep': { label: '조리대', vel: 0.7 },
      'oven': { label: '오븐', vel: 0.5 },
      'dish': { label: '세척기', vel: 0.7 },
      'fry': { label: '튀김/부침기', vel: 0.7 },
      'other': { label: '기타', vel: 0.5 }
    };

    function App() {
      const [workplaceName, setWorkplaceName] = useState("");
      const [useLayout, setUseLayout] = useState(true); 
      const [nodes, setNodes] = useState([]);
      const [edges, setEdges] = useState([]);
      const [guides, setGuides] = useState([]); 

      const [tool, setTool] = useState("select"); 
      const [selectedNodeId, setSelectedNodeId] = useState(null);
      const [selectedEdgeId, setSelectedEdgeId] = useState(null);
      const [draggingNodeId, setDraggingNodeId] = useState(null);
      const [drawingEdge, setDrawingEdge] = useState(null);
      const svgRef = useRef(null);

      const [checklist, setChecklist] = useState({
        size: { status: '양호', remark: '', improvement: '' },
        duct: { status: '양호', remark: '', improvement: '' },
        height: { status: '양호', remark: '', improvement: '' },
        velocity: { remark: '', improvement: '' },
        volume: { remark: '', improvement: '' }
      });

      const handleChecklistChange = (category, field, value) => {
        setChecklist(prev => ({ ...prev, [category]: { ...prev[category], [field]: value } }));
      };

      // ✅ 데이터 저장 기능 ✅
      const handleSave = () => {
        const dataToSave = { workplaceName, useLayout, nodes, edges, checklist };
        const jsonString = JSON.stringify(dataToSave);
        const blob = new Blob([jsonString], { type: "application/json" });
        const href = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = href;
        link.download = `${workplaceName || "급식실_스마트점검"}_데이터.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // ✅ 데이터 불러오기 기능 ✅
      const handleLoad = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const loadedData = JSON.parse(e.target.result);
            if (loadedData.workplaceName !== undefined) setWorkplaceName(loadedData.workplaceName);
            if (loadedData.useLayout !== undefined) setUseLayout(loadedData.useLayout);
            if (loadedData.nodes) setNodes(loadedData.nodes);
            if (loadedData.edges) setEdges(loadedData.edges);
            if (loadedData.checklist) setChecklist(loadedData.checklist);
            
            setSelectedNodeId(null);
            setSelectedEdgeId(null);
            setGuides([]);
            alert("데이터를 성공적으로 불러왔습니다!");
          } catch (error) {
            alert("파일 형식이 올바르지 않거나 손상되었습니다.");
          }
        };
        reader.readAsText(file);
        event.target.value = null; // 초기화
      };

      const getMousePos = (e) => {
        if (!useLayout || !svgRef.current) return { rawX: 0, rawY: 0 };
        const svg = svgRef.current;
        const CTM = svg.getScreenCTM();
        let clientX = e.clientX, clientY = e.clientY;
        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
        }
        const rawX = (clientX - CTM.e) / CTM.a;
        const rawY = (clientY - CTM.f) / CTM.d;
        return { rawX, rawY };
      };

      const findSnapTarget = (rawX, rawY, excludeNodeId) => {
        const nearbyNodes = nodes.filter(n => n.id !== excludeNodeId && Math.abs(n.x - rawX) < 25 && Math.abs(n.y - rawY) < 25);
        if (nearbyNodes.length > 0) {
          const mainNode = nearbyNodes.find(n => n.type !== 'joint');
          const snapNode = mainNode || nearbyNodes[0];
          return { type: 'node', node: snapNode, x: snapNode.x, y: snapNode.y };
        }
        return null;
      };

      const createHood = (x = 110, y = 110) => {
        const hoodNum = nodes.filter(n => n.type === 'hood').length + 1;
        const newNode = {
          id: `hood-${Date.now()}`, type: 'hood', x, y,
          data: {
            processName: `조리대-${hoodNum}`, photo: null, kHoodType: "prep", 
            controlVelocity: 0.7, measuredVelocity: "", 
            width: "", height: "", manualFanName: "", remarks: "",
            equipWidth: "", equipHeight: "", hoodDepth: "", hoodBottomHeight: "", ductCount: "1"
          }
        };
        setNodes(prev => [...prev, newNode]); setSelectedNodeId(newNode.id);
      };

      const createFan = (x = 210, y = 110) => {
        const newNode = {
          id: `fan-${Date.now()}`, type: 'fan', x, y,
          data: { 
            fanName: `송풍기-${nodes.filter(n => n.type === 'fan').length + 1}`, 
            photo: null, // ✅ 송풍기 사진 속성 추가
            ratedQ: "", ratedSP: "", measuredQ: "", measuredSP: "" 
          }
        };
        setNodes(prev => [...prev, newNode]); setSelectedNodeId(newNode.id);
      };

      const handlePointerDown = (e) => {
        if (!useLayout) return;
        const { rawX, rawY } = getMousePos(e);
        const x = Math.round((rawX - 10) / 20) * 20 + 10;
        const y = Math.round((rawY - 10) / 20) * 20 + 10;
        
        if (tool === 'select') { setSelectedNodeId(null); setSelectedEdgeId(null); } 
        else if (tool === 'hood') { createHood(x, y); setTool('select'); } 
        else if (tool === 'fan') { createFan(x, y); setTool('select'); } 
        else if (tool === 'line') {
          const snapTarget = findSnapTarget(rawX, rawY, null);
          let startNodeId = snapTarget ? snapTarget.node.id : (() => {
            const n = { id: `joint-${Date.now()}`, type: 'joint', x, y, data: {} };
            setNodes(prev => [...prev, n]); return n.id;
          })();
          setDrawingEdge({ startNodeId, x, y, cornerX: null, cornerY: null, snapTarget: null });
        }
      };

      const handlePointerMove = (e) => {
        if (!useLayout) return;
        let { rawX, rawY } = getMousePos(e);
        let snappedX = Math.round((rawX - 10) / 20) * 20 + 10;
        let snappedY = Math.round((rawY - 10) / 20) * 20 + 10;
        let activeGuides = [];

        const checkAlignment = (excludeId) => {
          let foundX = false, foundY = false;
          nodes.forEach(n => {
            if (n.id === excludeId) return;
            if (!foundX && Math.abs(rawX - n.x) < 15) { snappedX = n.x; activeGuides.push({ axis: 'x', value: n.x }); foundX = true; }
            if (!foundY && Math.abs(rawY - n.y) < 15) { snappedY = n.y; activeGuides.push({ axis: 'y', value: n.y }); foundY = true; }
          });
        };

        if (draggingNodeId) {
          checkAlignment(draggingNodeId); setGuides(activeGuides);
          setNodes(prev => prev.map(n => n.id === draggingNodeId ? { ...n, x: snappedX, y: snappedY } : n)); return;
        }
        
        if (drawingEdge) {
          checkAlignment(drawingEdge.startNodeId); setGuides(activeGuides);
          const startNode = nodes.find(n => n.id === drawingEdge.startNodeId);
          if (!startNode) return;

          const isHorizontal = Math.abs(rawX - startNode.x) > Math.abs(rawY - startNode.y);
          let currentX = isHorizontal ? snappedX : startNode.x, currentY = isHorizontal ? startNode.y : snappedY;
          let cornerX = null, cornerY = null, snapTarget = findSnapTarget(rawX, rawY, startNode.id);

          if (snapTarget) {
            currentX = snapTarget.x; currentY = snapTarget.y;
            if (startNode.x !== currentX && startNode.y !== currentY) {
              cornerX = isHorizontal ? currentX : startNode.x; cornerY = isHorizontal ? startNode.y : currentY;
            }
          }
          setDrawingEdge({ ...drawingEdge, x: currentX, y: currentY, cornerX, cornerY, snapTarget });
          return;
        }
        setGuides([]); 
      };

      const handlePointerUp = (e) => {
        if (!useLayout) return;
        setGuides([]);
        if (draggingNodeId) { setDraggingNodeId(null); return; }
        if (!drawingEdge) return;
        
        let { rawX, rawY } = getMousePos(e);
        const startNode = nodes.find(n => n.id === drawingEdge.startNodeId);
        if (!startNode) return;

        const isHorizontal = Math.abs(rawX - startNode.x) > Math.abs(rawY - startNode.y);
        let currentX = isHorizontal ? Math.round((rawX - 10) / 20) * 20 + 10 : startNode.x;
        let currentY = isHorizontal ? startNode.y : Math.round((rawY - 10) / 20) * 20 + 10;
        let cornerX = null, cornerY = null;
        let finalSnapTarget = findSnapTarget(rawX, rawY, startNode.id);

        if (finalSnapTarget) {
          currentX = finalSnapTarget.x; currentY = finalSnapTarget.y;
          if (startNode.x !== currentX && startNode.y !== currentY) {
            cornerX = isHorizontal ? currentX : startNode.x; cornerY = isHorizontal ? startNode.y : currentY;
          }
        }

        let newNodes = [...nodes], newEdges = [...edges], lastEndId = startNode.id;
        if (cornerX !== null) {
          const cornerNode = { id: `joint-${Date.now()}-c`, type: 'joint', x: cornerX, y: cornerY, data: {} };
          newNodes.push(cornerNode); newEdges.push({ id: `edge-${Date.now()}-c`, from: lastEndId, to: cornerNode.id });
          lastEndId = cornerNode.id;
        }

        let targetNodeId;
        if (finalSnapTarget) {
          if (finalSnapTarget.type === 'node') targetNodeId = finalSnapTarget.node.id;
          else {
            const splitEdge = finalSnapTarget.edge;
            const splitJoint = { id: `joint-${Date.now()}-s`, type: 'joint', x: currentX, y: currentY, data: {} };
            newNodes.push(splitJoint);
            newEdges = newEdges.filter(e => e.id !== splitEdge.id);
            newEdges.push({ id: `edge-${Date.now()}-s1`, from: splitEdge.from, to: splitJoint.id });
            newEdges.push({ id: `edge-${Date.now()}-s2`, from: splitJoint.id, to: splitEdge.to });
            targetNodeId = splitJoint.id;
          }
        } else {
          const endJoint = { id: `joint-${Date.now()}-e`, type: 'joint', x: currentX, y: currentY, data: {} };
          newNodes.push(endJoint); targetNodeId = endJoint.id;
        }
        if (lastEndId !== targetNodeId) newEdges.push({ id: `edge-${Date.now()}-e`, from: lastEndId, to: targetNodeId });

        setNodes(newNodes); setEdges(newEdges); setDrawingEdge(null); setTool('select');
      };

      const handleNodePointerDown = (e, id) => {
        if (!useLayout) return;
        e.stopPropagation();
        if (tool === 'select') { setSelectedEdgeId(null); setSelectedNodeId(id); setDraggingNodeId(id); } 
        else if (tool === 'line' && !drawingEdge) {
          const node = nodes.find(n => n.id === id);
          setDrawingEdge({ startNodeId: id, x: node.x, y: node.y, cornerX: null, cornerY: null, snapTarget: null });
        }
      };

      const handleEdgePointerDown = (e, id) => {
        if (!useLayout) return;
        e.stopPropagation();
        if (tool === 'select') { setSelectedNodeId(null); setSelectedEdgeId(id); setDraggingEdgeId(id); }
      };

      const deleteSelected = () => {
        if (selectedNodeId) {
          setNodes(nodes.filter(n => n.id !== selectedNodeId));
          setEdges(edges.filter(e => e.from !== selectedNodeId && e.to !== selectedNodeId));
          setSelectedNodeId(null);
        } else if (selectedEdgeId) {
          setEdges(edges.filter(e => e.id !== selectedEdgeId)); setSelectedEdgeId(null);
        }
      };

      const updateNodeData = (field, value) => {
        if (!selectedNodeId) return;
        setNodes(prevNodes => prevNodes.map(n => {
          if (n.id === selectedNodeId) {
            let newData = { ...n.data, [field]: value };
            if (field === 'kHoodType') {
              newData.controlVelocity = KITCHEN_HOOD_TYPES[value].vel;
              newData.processName = `${KITCHEN_HOOD_TYPES[value].label}-${prevNodes.filter(x => x.type === 'hood').length}`;
            }
            return { ...n, data: newData };
          }
          return n;
        }));
      };

      const handlePhotoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => updateNodeData('photo', ev.target.result);
          reader.readAsDataURL(file);
        }
      };

      const calculateResult = (data) => {
        const w = parseFloat(data.width) || 0, h = parseFloat(data.height) || 0;
        let area = w * h;
        const vc = parseFloat(data.controlVelocity) || 0;
        const vm = parseFloat(data.measuredVelocity) || 0;
        
        let requiredQ = area * vc * 60; 
        const currentQ = area * vm * 60;

        const isVelocityGood = vm >= vc; 
        const isVolumeGood = currentQ >= requiredQ;
        const isGood = isVelocityGood && isVolumeGood && currentQ > 0;

        const ew = parseFloat(data.equipWidth) || 0;
        const eh = parseFloat(data.equipHeight) || 0;
        const hd = parseFloat(data.hoodDepth) || 0;
        let isSizeGood = true;
        let sizeBadReason = [];
        if (ew > 0 && w < ew + 0.15) { isSizeGood = false; sizeBadReason.push("가로 돌출폭 부족"); }
        if (eh > 0 && h < eh + 0.15) { isSizeGood = false; sizeBadReason.push("세로 돌출폭 부족"); }
        if (hd > 0 && hd < 0.6) { isSizeGood = false; sizeBadReason.push("깊이 60cm 미달"); }

        const hb = parseFloat(data.hoodBottomHeight) || 0;
        const isHeightGood = hb > 0 && hb <= 1.2;

        const dCount = parseInt(data.ductCount) || 1;
        const reqDuctCount = Math.ceil(w / 1.8);
        const isDuctGood = w > 0 ? (dCount >= reqDuctCount) : true;

        return { 
          area: area.toFixed(2), 
          requiredQ: requiredQ.toFixed(1), currentQ: currentQ.toFixed(1), 
          isVelocityGood, isVolumeGood, isGood,
          isSizeGood, sizeBadReason: sizeBadReason.join(', '),
          isHeightGood, isDuctGood, reqDuctCount
        };
      };

      const hoodsData = useMemo(() => {
        return nodes.filter(n => n.type === 'hood').map(n => {
          return { ...n, calc: calculateResult(n.data) };
        });
      }, [nodes]);

      const fansData = useMemo(() => {
        return nodes.filter(n => n.type === 'fan').map(fan => {
          const connectedHoods = hoodsData.filter(h => h.data.manualFanName && h.data.manualFanName.trim() === fan.data.fanName.trim());
          const sumReqQ = connectedHoods.reduce((sum, h) => sum + parseFloat(h.calc.requiredQ || 0), 0);
          const sumCurrentQ = connectedHoods.reduce((sum, h) => sum + parseFloat(h.calc.currentQ || 0), 0);
          
          const rQ = parseFloat(fan.data.ratedQ) || 0, mQ = parseFloat(fan.data.measuredQ) || 0;
          const eff = rQ > 0 ? (mQ / rQ) * 100 : 0;
          let status = '-';
          if (rQ > 0 && mQ > 0) {
             if (eff >= 80) status = '양호';
             else if (eff >= 60) status = '미흡';
             else status = '불량';
          }
          return { ...fan, calc: { connectedHoods, sumReqQ, sumCurrentQ, eff, status } };
        });
      }, [nodes, hoodsData]);

      const evalData = useMemo(() => {
        if (hoodsData.length === 0) return { sizeStatus: '-', sizeTarget: '', ductStatus: '-', ductTarget: '', heightStatus: '-', heightTarget: '', velStatus: '-', velTarget: '', volStatus: '-', volTarget: '' };

        const badSizeHoods = hoodsData.filter(h => !h.calc.isSizeGood && (h.data.equipWidth || h.data.hoodDepth)).map(h => `${h.data.processName}(${h.calc.sizeBadReason})`).join(', ');
        const badDuctHoods = hoodsData.filter(h => !h.calc.isDuctGood && h.data.width).map(h => h.data.processName).join(', ');
        const badHeightHoods = hoodsData.filter(h => !h.calc.isHeightGood && h.data.hoodBottomHeight).map(h => h.data.processName).join(', ');
        const badVelHoods = hoodsData.filter(h => !h.calc.isVelocityGood).map(h => h.data.processName).join(', ');
        const badVolHoods = hoodsData.filter(h => !h.calc.isVolumeGood).map(h => h.data.processName).join(', ');
        
        return {
          sizeStatus: badSizeHoods ? '미흡' : '양호',
          sizeTarget: badSizeHoods ? `[미흡: ${badSizeHoods}]` : '',
          ductStatus: badDuctHoods ? '미흡' : '양호',
          ductTarget: badDuctHoods ? `[미흡: ${badDuctHoods}]` : '',
          heightStatus: badHeightHoods ? '미흡' : '양호',
          heightTarget: badHeightHoods ? `[미흡: ${badHeightHoods}]` : '',
          velStatus: badVelHoods ? '미흡' : '양호',
          velTarget: badVelHoods ? `[미흡: ${badVelHoods}]` : '',
          volStatus: badVolHoods ? '미흡' : '양호',
          volTarget: badVolHoods ? `[미흡: ${badVolHoods}]` : '',
        };
      }, [hoodsData]);

      const selectedNode = nodes.find(n => n.id === selectedNodeId);
      const selectedNodeCalc = selectedNode?.type === 'hood' ? calculateResult(selectedNode.data) : null;

      const totalHoods = hoodsData.length, goodHoods = hoodsData.filter(h => h.calc.isGood).length, badHoods = totalHoods - goodHoods;
      const pieDashArray = totalHoods > 0 ? (goodHoods / totalHoods) * 100 : 0;

      const evaluatedFans = fansData.filter(f => f.calc.status !== '-');
      const totalEvalFans = evaluatedFans.length;
      const goodFans = evaluatedFans.filter(f => f.calc.status === '양호').length;
      const fairFans = evaluatedFans.filter(f => f.calc.status === '미흡').length;
      const badFans = evaluatedFans.filter(f => f.calc.status === '불량').length;
      const fanGoodPct = totalEvalFans > 0 ? (goodFans / totalEvalFans) * 100 : 0;
      const fanFairPct = totalEvalFans > 0 ? (fairFans / totalEvalFans) * 100 : 0;

      return (
        <div className="flex flex-col lg:flex-row h-screen bg-slate-100 font-sans text-slate-800 overflow-hidden print:block print:h-auto print:overflow-visible">
          
          {/* ========================================== */}
          {/* 좌측 패널 (입력 컨트롤) */}
          {/* ========================================== */}
          <div className="w-full lg:w-[450px] flex-shrink-0 bg-white border-r border-slate-200 shadow-xl z-10 flex flex-col h-full print:hidden">
            <div className="p-4 bg-orange-600 text-white flex justify-between items-center">
              <div>
                <h1 className="text-lg font-black flex items-center gap-2"><ChefHat className="w-5 h-5" /> 급식실 배기장치 스마트점검</h1>
                <p className="text-orange-200 text-xs mt-1">KOSHA W-26-2022 기준 완벽 적용</p>
              </div>
              <div className="flex gap-2">
                <label className="bg-orange-800 hover:bg-orange-700 p-2 rounded flex items-center justify-center gap-1 text-xs font-bold shadow-sm transition-colors border border-orange-500 cursor-pointer">
                  <Upload className="w-4 h-4" /> 불러오기
                  <input type="file" accept=".json" className="hidden" onChange={handleLoad} />
                </label>
                <button onClick={handleSave} className="bg-orange-800 hover:bg-orange-700 p-2 rounded flex items-center justify-center gap-1 text-xs font-bold shadow-sm transition-colors border border-orange-500">
                  <Save className="w-4 h-4" /> 저장
                </button>
                <button onClick={() => window.print()} className="bg-orange-800 hover:bg-orange-700 p-2 rounded flex items-center justify-center gap-1 text-xs font-bold shadow-sm transition-colors border border-orange-500">
                  <Printer className="w-4 h-4" /> 출력
                </button>
              </div>
            </div>

            <div className="flex-1 overflow-y-auto p-4 space-y-6">
              {/* 1. 작업장 및 Layout 설정 */}
              <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <h2 className="text-sm font-black text-slate-700 mb-3">1. 작업장 및 레이아웃 설정</h2>
                <div className="relative mb-3">
                  <Factory className="absolute left-3 top-3 w-5 h-5 text-slate-400" />
                  <input type="text" placeholder="작업장 명칭 (예: 00학교 급식실)" 
                    value={workplaceName} onChange={e => setWorkplaceName(e.target.value)}
                    className="w-full pl-10 p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none font-bold text-slate-700" />
                </div>
                <div className="flex items-center justify-between mb-3">
                  <span className="text-xs font-bold text-slate-600">도면(Lay-out) 직접 그리기</span>
                  <label className="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" className="sr-only peer" checked={useLayout} onChange={e => {
                      setUseLayout(e.target.checked);
                      if (!e.target.checked) setTool('select');
                    }} />
                    <div className="w-9 h-5 bg-slate-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-orange-500"></div>
                  </label>
                </div>
                
                {useLayout ? (
                  <div className="grid grid-cols-4 gap-2">
                    <button onClick={() => setTool('select')} className={`flex flex-col items-center py-2 rounded border ${tool === 'select' ? 'bg-orange-100 text-orange-700 border-orange-300' : 'bg-white hover:bg-slate-100 border-slate-200'}`}>
                      <MousePointer2 className="w-4 h-4 mb-1" /> <span className="text-[10px] font-bold">선택/수정</span>
                    </button>
                    <button onClick={() => setTool('fan')} className={`flex flex-col items-center py-2 rounded border ${tool === 'fan' ? 'bg-orange-100 text-orange-700 border-orange-300' : 'bg-white hover:bg-slate-100 border-slate-200'}`}>
                      <Fan className="w-4 h-4 mb-1" /> <span className="text-[10px] font-bold">송풍기</span>
                    </button>
                    <button onClick={() => setTool('hood')} className={`flex flex-col items-center py-2 rounded border ${tool === 'hood' ? 'bg-orange-100 text-orange-700 border-orange-300' : 'bg-white hover:bg-slate-100 border-slate-200'}`}>
                      <Square className="w-4 h-4 mb-1" /> <span className="text-[10px] font-bold">후드</span>
                    </button>
                    <button onClick={() => setTool('line')} className={`flex flex-col items-center py-2 rounded border ${tool === 'line' ? 'bg-orange-100 text-orange-700 border-orange-300' : 'bg-white hover:bg-slate-100 border-slate-200'}`}>
                      <Minus className="w-4 h-4 mb-1" /> <span className="text-[10px] font-bold">배관</span>
                    </button>
                  </div>
                ) : (
                  <div className="flex gap-2">
                    <button onClick={() => createHood()} className="flex-1 bg-white border border-slate-300 py-2 rounded text-xs font-bold hover:bg-slate-100">+ 후드 추가</button>
                    <button onClick={() => createFan()} className="flex-1 bg-white border border-slate-300 py-2 rounded text-xs font-bold hover:bg-slate-100">+ 송풍기 추가</button>
                  </div>
                )}
                
                {!useLayout && (
                  <div className="mt-3 flex gap-2 overflow-x-auto pb-2">
                    {nodes.map(n => (
                      <button key={n.id} onClick={() => setSelectedNodeId(n.id)} className={`flex-shrink-0 px-3 py-1.5 rounded-full text-[10px] font-bold border transition-colors ${selectedNodeId === n.id ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-600 border-slate-300'}`}>
                        {n.type === 'fan' ? <Fan className="w-3 h-3 inline mr-1" /> : null}
                        {n.type === 'fan' ? n.data.fanName : n.data.processName}
                      </button>
                    ))}
                  </div>
                )}
              </div>

              {/* 2. 제원 입력 (후드 / 송풍기) */}
              <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 min-h-[350px]">
                <div className="flex justify-between items-center mb-3 border-b border-slate-200 pb-2">
                  <h2 className="text-sm font-black text-slate-700">2. 설비 제원 및 측정결과 입력</h2>
                  {(selectedNodeId || selectedEdgeId) && (
                    <button onClick={deleteSelected} className="text-red-500 hover:text-red-700 flex items-center gap-1 text-[10px] font-bold bg-red-50 px-2 py-1 rounded border border-red-200">
                      <Trash2 className="w-3 h-3" /> 객체 삭제
                    </button>
                  )}
                </div>

                {!selectedNode ? (
                  <div className="py-10 text-center text-slate-400 text-xs font-bold">
                    도면이나 상단 목록에서<br/>입력할 송풍기나 후드를 선택하세요.
                  </div>
                ) : selectedNode.type === 'fan' ? (
                  <div className="space-y-3 animate-in fade-in">
                    <div>
                      <label className="block text-[10px] font-bold mb-1 text-slate-600">송풍기 명칭 (자유입력)</label>
                      <input type="text" value={selectedNode.data.fanName || ""} onChange={e => updateNodeData('fanName', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm font-bold focus:border-orange-500 outline-none" />
                    </div>
                    {/* ✅ 송풍기 사진 첨부 추가 ✅ */}
                    <div>
                      <label className="block text-[10px] font-bold mb-1 text-slate-600">송풍기 설치 사진</label>
                      <label className="flex justify-center items-center gap-2 w-full p-2 border border-slate-300 rounded text-xs font-bold bg-white hover:bg-slate-50 cursor-pointer">
                        <Camera className="w-4 h-4 text-slate-500" /> {selectedNode.data.photo ? "사진 변경" : "촬영 또는 첨부"}
                        <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhotoUpload} />
                      </label>
                      {selectedNode.data.photo && (
                        <div className="mt-2 relative w-24 h-16 rounded border border-slate-200 overflow-hidden">
                          <img src={selectedNode.data.photo} className="w-full h-full object-cover" />
                          <button onClick={() => updateNodeData('photo', null)} className="absolute top-0.5 right-0.5 bg-red-500 text-white rounded-full p-0.5"><XCircle className="w-3 h-3" /></button>
                        </div>
                      )}
                    </div>
                    <div className="grid grid-cols-2 gap-3 bg-white p-3 rounded border border-slate-200">
                      <div className="col-span-2 text-xs font-bold text-slate-800 mb-1 border-b pb-1">명판 사양 (정격)</div>
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-slate-500">송풍량 (CMM)</label>
                        <input type="number" step="0.1" value={selectedNode.data.ratedQ || ""} onChange={e => updateNodeData('ratedQ', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-slate-500">정압 (mmAq)</label>
                        <input type="number" step="0.1" value={selectedNode.data.ratedSP || ""} onChange={e => updateNodeData('ratedSP', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none" />
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-3 bg-orange-50 p-3 rounded border border-orange-200">
                      <div className="col-span-2 text-xs font-black text-orange-800 mb-1 border-b border-orange-200 pb-1">현장 측정 결과</div>
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-orange-700">송풍량 (CMM)</label>
                        <input type="number" step="0.1" value={selectedNode.data.measuredQ || ""} onChange={e => updateNodeData('measuredQ', e.target.value)} className="w-full p-2 border border-orange-300 rounded text-sm font-bold outline-none focus:ring-2 focus:ring-orange-500 bg-white" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-orange-700">정압 (mmAq)</label>
                        <input type="number" step="0.1" value={selectedNode.data.measuredSP || ""} onChange={e => updateNodeData('measuredSP', e.target.value)} className="w-full p-2 border border-orange-300 rounded text-sm font-bold outline-none focus:ring-2 focus:ring-orange-500 bg-white" />
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-3 animate-in fade-in">
                    
                    <div className="bg-slate-800 p-2.5 rounded text-white shadow-sm">
                      <label className="block text-[10px] font-bold mb-1 text-slate-300">연결할 송풍기 선택 (표 병합용)</label>
                      <select value={selectedNode.data.manualFanName || ""} onChange={e => updateNodeData('manualFanName', e.target.value)} className="w-full p-1.5 border-b border-slate-500 bg-transparent text-sm font-bold outline-none">
                        <option value="" className="text-slate-800">-- 송풍기 미지정 --</option>
                        {nodes.filter(n => n.type === 'fan').map(f => <option key={f.id} value={f.data.fanName} className="text-slate-800">{f.data.fanName}</option>)}
                      </select>
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-slate-600">급식실 후드 종류</label>
                        <select value={selectedNode.data.kHoodType} onChange={e => updateNodeData('kHoodType', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm font-bold outline-none bg-white">
                          {Object.keys(KITCHEN_HOOD_TYPES).map(k => <option key={k} value={k}>{KITCHEN_HOOD_TYPES[k].label}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-slate-600">상세 명칭 (공정명)</label>
                        <input type="text" value={selectedNode.data.processName} onChange={e => updateNodeData('processName', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm font-bold outline-none focus:border-orange-500" />
                      </div>
                    </div>

                    <div>
                      <label className="block text-[10px] font-bold mb-1 text-slate-600">후드 설치 사진</label>
                      <label className="flex justify-center items-center gap-2 w-full p-2 border border-slate-300 rounded text-xs font-bold bg-white hover:bg-slate-50 cursor-pointer">
                        <Camera className="w-4 h-4 text-slate-500" /> {selectedNode.data.photo ? "사진 변경" : "촬영 또는 첨부"}
                        <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handlePhotoUpload} />
                      </label>
                      {selectedNode.data.photo && (
                        <div className="mt-2 relative w-24 h-16 rounded border border-slate-200 overflow-hidden">
                          <img src={selectedNode.data.photo} className="w-full h-full object-cover" />
                          <button onClick={() => updateNodeData('photo', null)} className="absolute top-0.5 right-0.5 bg-red-500 text-white rounded-full p-0.5"><XCircle className="w-3 h-3" /></button>
                        </div>
                      )}
                    </div>

                    <div className="bg-white p-3 rounded border border-slate-200 space-y-3">
                      <div className="text-xs font-bold text-slate-800 border-b pb-1">후드 상세 규격 (m)</div>
                      <div className="grid grid-cols-2 gap-3">
                        <div className="flex items-center gap-1">
                          <input type="number" step="0.1" placeholder="후드 가로폭" value={selectedNode.data.width} onChange={e => updateNodeData('width', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none focus:border-orange-500" /> <span className="text-[10px] text-slate-400">m</span>
                        </div>
                        <div className="flex items-center gap-1">
                          <input type="number" step="0.1" placeholder="후드 세로폭" value={selectedNode.data.height} onChange={e => updateNodeData('height', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none focus:border-orange-500" /> <span className="text-[10px] text-slate-400">m</span>
                        </div>
                        <div className="flex items-center gap-1">
                          <input type="number" step="0.1" placeholder="내부 깊이" value={selectedNode.data.hoodDepth} onChange={e => updateNodeData('hoodDepth', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none focus:border-orange-500" /> <span className="text-[10px] text-slate-400">m</span>
                        </div>
                        <div className="flex items-center gap-1">
                          <input type="number" step="0.1" placeholder="조리대~후드끝 높이" value={selectedNode.data.hoodBottomHeight} onChange={e => updateNodeData('hoodBottomHeight', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none focus:border-orange-500" /> <span className="text-[10px] text-slate-400">m</span>
                        </div>
                      </div>
                      <div className="pt-2 border-t border-slate-100 grid grid-cols-2 gap-3">
                        <div className="flex items-center gap-1">
                          <input type="number" step="0.1" placeholder="조리대 가로폭" value={selectedNode.data.equipWidth} onChange={e => updateNodeData('equipWidth', e.target.value)} className="w-full p-1.5 border border-slate-200 rounded text-xs outline-none bg-slate-50" /> <span className="text-[9px] text-slate-400">m</span>
                        </div>
                        <div className="flex items-center gap-1">
                          <input type="number" step="0.1" placeholder="조리대 세로폭" value={selectedNode.data.equipHeight} onChange={e => updateNodeData('equipHeight', e.target.value)} className="w-full p-1.5 border border-slate-200 rounded text-xs outline-none bg-slate-50" /> <span className="text-[9px] text-slate-400">m</span>
                        </div>
                      </div>
                      <div className="pt-2">
                        <label className="block text-[10px] font-bold mb-1 text-slate-600">설치된 덕트(가지관) 개수</label>
                        <input type="number" min="1" step="1" value={selectedNode.data.ductCount || "1"} onChange={e => updateNodeData('ductCount', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none" />
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3 bg-orange-50 p-3 rounded border border-orange-200">
                      <div className="col-span-2 text-xs font-black text-orange-800 mb-1 border-b border-orange-200 pb-1">풍속 결과 (m/s)</div>
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-orange-700">기준 면속도 (법정)</label>
                        <input type="number" step="0.1" value={selectedNode.data.controlVelocity} onChange={e => updateNodeData('controlVelocity', e.target.value)} className="w-full p-2 border border-orange-300 rounded text-sm font-bold outline-none focus:border-orange-500 bg-white" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold mb-1 text-orange-700">후드 면 측정 풍속</label>
                        <input type="number" step="0.1" value={selectedNode.data.measuredVelocity} onChange={e => {
                          updateNodeData('measuredVelocity', e.target.value);
                        }} className="w-full p-2 border-2 border-orange-400 rounded text-sm font-black outline-none focus:border-orange-600 bg-white text-orange-900" />
                      </div>
                    </div>

                    <div className="mt-2">
                      <label className="block text-[10px] font-bold mb-1 text-slate-700">특이사항 (수동 비고란)</label>
                      <input type="text" placeholder="결과표 비고란에 출력됩니다" value={selectedNode.data.remarks || ""} onChange={e => updateNodeData('remarks', e.target.value)} className="w-full p-2 border border-slate-300 rounded text-sm outline-none" />
                    </div>

                    {selectedNodeCalc && (
                      <div className={`p-2 rounded border font-bold text-xs flex justify-between ${selectedNodeCalc.isGood ? 'bg-emerald-50 text-emerald-700 border-emerald-300' : 'bg-red-50 text-red-700 border-red-300'}`}>
                        <span>필요: {selectedNodeCalc.requiredQ} CMM</span>
                        <span>현재: {selectedNodeCalc.currentQ} CMM</span>
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* 3. 시설 종합 점검표 수동/자동 혼합 입력 */}
              <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                <h2 className="text-sm font-black text-slate-700 mb-3 flex items-center gap-1"><FileCheck className="w-4 h-4"/> 1-4 종합 평가표 (자동 판정 연동)</h2>
                <div className="space-y-4">
                  <div className="border border-slate-200 bg-slate-100 rounded p-3">
                    <div className="flex justify-between items-center mb-2 border-b border-slate-200 pb-2">
                      <span className="text-xs font-bold">후드 적정크기 <span className="font-normal text-[8px] text-blue-500">(자동)</span></span>
                      <span className={`text-xs font-black ${evalData.sizeStatus === '양호' ? 'text-blue-600' : 'text-red-600'}`}>{evalData.sizeStatus}</span>
                    </div>
                    {evalData.sizeStatus === '미흡' && <div className="text-[10px] font-bold text-red-500 mb-2 leading-tight">{evalData.sizeTarget}</div>}
                    <input type="text" placeholder="비고 (수동 추가)" value={checklist.size.remark} onChange={e => handleChecklistChange('size', 'remark', e.target.value)} className="w-full p-1.5 border rounded text-[10px] mb-1 outline-none bg-white" />
                    <input type="text" placeholder="개선방향 (수동 입력)" value={checklist.size.improvement} onChange={e => handleChecklistChange('size', 'improvement', e.target.value)} className="w-full p-1.5 border rounded text-[10px] outline-none bg-white" />
                  </div>
                  <div className="border border-slate-200 bg-slate-100 rounded p-3">

                    <svg ref={svgRef} className={`w-full h-full ${tool !== 'select' ? 'cursor-crosshair' : 'cursor-default'}`}
                         onPointerDown={handlePointerDown} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp}>
                      <defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="1" fill="#e2e8f0" className="print:hidden"/></pattern></defs>
                      <rect width="100%" height="100%" fill="url(#grid)" className="print:hidden" />
                      
                      {guides.map((g, i) => (
                        g.axis === 'x' 
                          ? <line key={`gx-${i}`} x1={g.value} y1="0" x2={g.value} y2="2000" stroke="#f97316" strokeWidth="1" strokeDasharray="4,4" className="pointer-events-none" />

                      ))}

                      {edges.map(e => {
                        const fromNode = nodes.find(n => n.id === e.from), toNode = nodes.find(n => n.id === e.to);

                        const isSelected = selectedEdgeId === e.id;
                        return (
                          <g key={e.id}>
                            <line x1={fromNode.x} y1={fromNode.y} x2={toNode.x} y2={toNode.y} stroke="transparent" strokeWidth="20" className={tool === 'select' ? "cursor-pointer print:hidden" : "pointer-events-none"} onPointerDown={(ev) => handleEdgePointerDown(ev, e.id)} />
                            <line x1={fromNode.x} y1={fromNode.y} x2={toNode.x} y2={toNode.y} stroke={isSelected ? "#f97316" : "#475569"} strokeWidth="3" strokeLinecap="round" className="pointer-events-none" />

                            </>
                          ) : <line x1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.x} y1={nodes.find(n=>n.id===drawingEdge.startNodeId)?.y} x2={drawingEdge.x} y2={drawingEdge.y} stroke="#f97316" strokeWidth="3" strokeDasharray="5,5" />}

                          <g key={n.id} transform={`translate(${n.x - 12}, ${n.y - 12})`} onPointerDown={(e) => handleNodePointerDown(e, n.id)} className={tool === 'select' ? "cursor-pointer" : "cursor-pointer"}>

                                  <td className="border border-slate-300 p-1 font-bold">{hood.calc.currentQ}</td>

                      <td className={`border border-slate-300 p-2 font-black align-middle ${evalData.sizeStatus === '양호' ? 'text-blue-600' : 'text-red-600'}`}>{evalData.sizeStatus}</td>
                      <td className="border border-slate-300 p-2 text-left whitespace-pre-wrap leading-relaxed">
                        {evalData.sizeTarget && <div className="text-red-600 font-bold mb-1">{evalData.sizeTarget}</div>}
                        {checklist.size.remark}
                      </td>
                      <td className="border border-slate-300 p-2 text-left whitespace-pre-wrap leading-relaxed">{checklist.size.improvement}</td>
                    </tr>
                    <tr>
                      <td className="border border-slate-300 p-2 font-bold">덕트연결 및 파손여부<br/><span className="font-normal text-[8px] text-slate-500">(1.8m 간격당 1개 이상)</span></td>
                      <td className={`border border-slate-300 p-2 font-black align-middle ${evalData.ductStatus === '양호' ? 'text-blue-600' : 'text-red-600'}`}>{evalData.ductStatus}</td>
                      <td className="border border-slate-300 p-2 text-left whitespace-pre-wrap leading-relaxed">
                        {evalData.ductTarget && <div className="text-red-600 font-bold mb-1">{evalData.ductTarget}</div>}
                        {checklist.duct.remark}
                      </td>
                      <td className="border border-slate-300 p-2 text-left whitespace-pre-wrap leading-relaxed">{checklist.duct.improvement}</td>
                    </tr>
                    <tr>
                      <td className="border border-slate-300 p-2 font-bold">후드설치 높이<br/><span className="font-normal text-[8px] text-slate-500">(조리대에서 1.2m 이내)</span></td>
                      <td className={`border border-slate-300 p-2 font-black align-middle ${evalData.heightStatus === '양호' ? 'text-blue-600' : 'text-red-600'}`}>{evalData.heightStatus}</td>
                      <td className="border border-slate-300 p-2 text-left whitespace-pre-wrap leading-relaxed">
                        {evalData.heightTarget && <div className="text-red-600 font-bold mb-1">{evalData.heightTarget}</div>}
                        {checklist.height.remark}
                      </td>
                      <td className="border border-slate-300 p-2 text-left whitespace-pre-wrap leading-relaxed">{checklist.height.improvement}</td>
                    </tr>
                    <tr>
                      <td className="border border-slate-300 p-2 font-bold bg-slate-50">제어풍속 기준만족</td>
                      <td className={`border border-slate-300 p-2 font-black align-middle bg-slate-50 ${evalData.velStatus === '양호' ? 'text-blue-600' : 'text-red-600'}`}>{evalData.velStatus}</td>
                      <td className="border border-slate-300 p-2 text-left whitespace-pre-wrap leading-relaxed bg-slate-50">
                        {evalData.velTarget !== '전체 기준 만족' && <div className="text-red-600 font-bold mb-1">{evalData.velTarget}</div>}
                        {checklist.velocity.remark}
                      </td>
                      <td className="border border-slate-300 p-2 text-left whitespace-pre-wrap leading-relaxed bg-slate-50">{checklist.velocity.improvement}</td>
                    </tr>
                    <tr>
                      <td className="border border-slate-300 p-2 font-bold bg-slate-50">필요배기량 충족여부</td>
                      <td className={`border border-slate-300 p-2 font-black align-middle bg-slate-50 ${evalData.volStatus === '양호' ? 'text-blue-600' : 'text-red-600'}`}>{evalData.volStatus}</td>
                      <td className="border border-slate-300 p-2 text-left whitespace-pre-wrap leading-relaxed bg-slate-50">
                        {evalData.volTarget !== '전체 기준 만족' && <div className="text-red-600 font-bold mb-1">{evalData.volTarget}</div>}
                        {checklist.volume.remark}
                      </td>
                      <td className="border border-slate-300 p-2 text-left whitespace-pre-wrap leading-relaxed bg-slate-50">{checklist.volume.improvement}</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              {/* 1-5. 참고 자료 섹션 */}
              <div className="mb-6 page-break-before page-break-inside-avoid flex-grow">
                <div className="flex justify-between items-end border-l-4 border-orange-500 pl-2 mb-2">
                  <h2 className="text-sm font-black text-slate-800">1-5. 참고 자료 (급식실 배기장치 설치 및 점검 가이드)</h2>
                </div>
                <div className="bg-white border border-slate-300 p-4 rounded text-xs space-y-4">
                  <div>
                    <h3 className="font-bold text-orange-700 mb-1">▶ 조리기구별 개구면 권장 풍속 (KOSHA Guide W-26-2022)</h3>
                    <table className="w-full border-collapse border border-slate-300 text-center text-[10px]">
                      <thead>
                        <tr className="bg-slate-50">
                          <th className="border border-slate-300 p-1">밥솥</th>
                          <th className="border border-slate-300 p-1">국솥</th>
                          <th className="border border-slate-300 p-1">조리대</th>
                          <th className="border border-slate-300 p-1">오븐</th>
                          <th className="border border-slate-300 p-1">세척기</th>
                          <th className="border border-slate-300 p-1">튀김/부침기</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr>
                          <td className="border border-slate-300 p-1 font-bold">0.5 m/s</td>
                          <td className="border border-slate-300 p-1 font-bold">0.5 m/s</td>
                          <td className="border border-slate-300 p-1 font-bold">0.7 m/s</td>
                          <td className="border border-slate-300 p-1 font-bold">0.5 m/s</td>
                          <td className="border border-slate-300 p-1 font-bold">0.7 m/s</td>
                          <td className="border border-slate-300 p-1 font-bold">0.7 m/s</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                  <div>
                    <h3 className="font-bold text-orange-700 mb-1">▶ 후드 적정 크기 및 설치 기준</h3>
                    <ul className="list-disc pl-4 text-[10px] text-slate-700 space-y-1">
                      <li><strong>돌출폭:</strong> 후드의 처마는 조리기구 상부에서 바깥쪽으로 <span className="font-bold text-red-600">최소 15cm 이상</span> 튀어나오게 설치하여 열기와 유해물질이 새어나가지 않도록 해야 합니다.</li>
                      <li><strong>내부 깊이:</strong> 포집 효율을 높이기 위해 후드 내부의 깊이는 <span className="font-bold text-red-600">최소 60cm 이상</span> 확보하는 것이 권장됩니다.</li>
                      <li><strong>설치 높이:</strong> 후드의 하단부는 작업자의 동선을 방해하지 않는 선에서 조리대기구 상단면으로부터 <span className="font-bold text-red-600">1.2m 이내</span>로 최대한 가깝게 설치해야 합니다.</li>
                      <li><strong>덕트 간격:</strong> 넓은 후드의 경우, 배기 불균형을 막기 위해 후드 가로폭 <span className="font-bold text-red-600">1.8m 당 1개 이상</span>의 배기 덕트(가지관)를 설치해야 합니다.</li>
                    </ul>
                  </div>
                </div>
              </div>

              {/* ✅ 저작권 표시 및 연락처 (우측 출력본 하단) ✅ */}
              <div className="mt-auto pt-4 text-center text-[10px] text-slate-400 font-bold border-t border-slate-300 print:mt-12 space-y-1">
                <div>ⓒ Copyright 2024. 2022582@kiha.or.kr All rights reserved.</div>
                <div className="text-orange-600">점검 미흡 및 오류 시 010-2815-6044 이규연 문의</div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
